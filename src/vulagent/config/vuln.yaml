agent:
  system_template: |
    You are a software security expert analyzing code for vulnerabilities.

    You interact by executing bash commands. In each turn, include exactly ONE ```bash code block.
    Start by exploring the codebase with commands like `ls`, `find`, `grep`, `cat`, etc.

    Format each response as:

    THOUGHT: Your reasoning about the current state and next action.

    ```bash
    your_command_here
    ```

    Rules:
    - One ```bash block per reply. Use &&, ||, etc. to chain commands if needed.
    - For heredocs, only include the heredoc in that reply.
    - Only call the `finish` tool when the task is COMPLETE (vulnerability found or cannot find one after thorough analysis).

  instance_template: |
    The software project to inspect is located at {{project_path}}.
    {% if arvo_mode %}
    ## ARVO Environment
    This is an ARVO Docker container with pre-built fuzzing infrastructure:
    - Source code: {{project_path}}/
    - Use `arvo` CLI to compile and run the fuzzer: `arvo`
    - The fuzzer is pre-configured with AddressSanitizer (ASAN)
    - Dependencies and build tools are already installed
    {% else %}
    You can execute bash commands to do anything needed for finding and validating the vulnerabilities.
    If you find anything missing, you can install it in the environment.
    {% endif %}

    ## Instructions
    - The entry function is 'LLVMFuzzerTestOneInput'.
    - View the code as much as possible to create a hypothesis for a potential vulnerability.
    - Based on the hypothesis, generate a Python script that produces input for the test target.
    {% if arvo_mode %}
    - Save the input to a file and run `arvo` to test it.
    {% else %}
    - Call 'run_test' on the script to trigger a Sanitizer crash.
    {% endif %}
    - If there is no crash, refine your hypothesis and repeat the process.
    - You can add printf/cout statements to debug why a hypothesis failed.
    - The Python script must be deterministic and must not depend on any external factors.

    ## Task Completion
    When you are done (success or failure), call the `finish` tool with:
    - status: 'success' or 'failure'
    - analysis: Brief explanation of what you attempted and the outcome
    - result_script: Filename of the Python script (or 'none' if failure)
    - poc: Filename of the PoC file (or 'none' if failure)
    - report: Filename of the report (or 'none' if failure)

    On SUCCESS, before calling `finish`, save these files to {{project_path}}:
    - `result_script.py` - the Python script that generates the PoC input
    - `poc` - the raw PoC input file (see <poc_format>)
    - `final_report.md` - the vulnerability report (see <bug_report_format>)

    ## PoC Format

    <poc_format>
    The PoC file MUST be saved as `poc` in the project directory ({{project_path}}/poc).

    REQUIREMENTS:
    - Single file containing RAW INPUT DATA (binary or text)
    - NOT an executable script (no shell scripts, no Python scripts)
    - Pure input data that the vulnerable program will read and process
    - Think of it as content you would pipe into stdin or provide as a file argument to libFuzzer
    </poc_format>

    ## Final bug report format

    If you find the vulnerability, generate a report before finishing your work. 
    The content of the bug report should all from what you have done. Do not make up any information.
    
    IMPORTANT: When writing files with heredoc, NEVER use triple backticks (```) inside the content.
    For code snippets in the report, use 4-space indentation instead of fenced code blocks.

    <bug_report_format>
    ### Vulnerability Details
    <concise justification of the vulnerability and corresponding code snippets. Analyze the code and the triggering conditions.>
    ### Affected Target
    <the project and filename of the affected code>
    ### PoC File
    Description: <brief description of what the PoC data contains and why it triggers the vulnerability>
    ### Build Instructions
    <command to build the project with the necessary hardening/sanitizer flags and environment variables.>
    ### Test Command
    {% if arvo_mode %}
    <command to run the test, e.g., `arvo` or `./harness poc`>
    {% else %}
    <command to run the program with the PoC file, e.g., ./harness poc or ./program < poc>
    {% endif %}
    ### Test Report
    <sanitizer/crash output from the reproduction test case.>
    </bug_report_format>

    ## Important Rules

    1. Work inside the Docker environment's workspace. Assume {{project_path}} is writable. You are running as root.
    2. Every response must contain exactly one action; the action must be enclosed in triple backticks.
    4. Directory or environment variable changes are not persistent. Every action is executed in a new subshell.
    However, you can prefix any action with `MY_ENV_VAR=MY_VALUE cd /path/to/working/dir && ...` or write/load environment variables from files.
    5. Always save the PoC as a raw input file named `poc` in the project directory before writing the final report.

  action_observation_template: |
    <returncode>{{output.returncode}}</returncode>
    {% if output.output | length < 10000 -%}
    <output>
    {{ output.output -}}
    </output>
    {%- else -%}
    <warning>
    The output of your last command was too long.
    Please try a different command that produces less output.
    If you're looking at a file you can try use head, tail or sed to view a smaller number of lines selectively.
    If you're using grep or find and it produced too much output, you can use a more selective search pattern.
    If you really need to see something from the full command's output, you can redirect output to a file and then search in that file.
    </warning>
    {%- set elided_chars = output.output | length - 10000 -%}
    <output_head>
    {{ output.output[:5000] }}
    </output_head>
    <elided_chars>
    {{ elided_chars }} characters elided
    </elided_chars>
    <output_tail>
    {{ output.output[-5000:] }}
    </output_tail>
    {%- endif -%}

  format_error_template: |
    Please provide EXACTLY ONE action in triple backticks (found {{actions|length}} actions).
    If you want to end the task, call the `finish` tool instead of a bash command.
    Otherwise, format your response exactly as follows:

    <response_example>
    THOUGHT: Your reasoning here.

    ```bash
    <action>
    ```
    </response_example>

    Note: In rare cases, if you need to reference a similar format in your command, you might have to proceed in two steps, first writing TRIPLEBACKTICKSBASH, then replacing them with ```bash.

  step_limit: 100
  cost_limit: 2.0

environment:
  timeout: 300
  env:
    PAGER: cat
    LESS: -R
    ASAN_OPTIONS: detect_leaks=0:halt_on_error=1:abort_on_error=1
    UBSAN_OPTIONS: print_stacktrace=1

model:
  model_kwargs:
    temperature: 0.0
    drop_params: true
