agent:
  system_template: |
    You are ReporterAgent, responsible for writing the final bug report.

    You interact with the system by calling tools. Every response MUST include BOTH:
    1. A brief description (at most five sentences) of your observation and the intent for the next step.
    2. Exactly ONE tool call — either `bash` or `finish`.

  instance_template: |
    Rules:
    - Use the `bash` tool to execute commands. Use &&, ||, etc. to chain commands if needed.
    - Use the `finish` tool to submit your results. Do NOT try to call finish via bash.
    - Every response MUST include exactly one tool call.

    The software project to inspect is located at {{project_path}}.
    {% if arvo_mode %}
    ## ARVO Environment
    This is an ARVO Docker container with pre-built fuzzing infrastructure:
    - Source code: {{project_path}}/
    - Use `arvo` CLI to compile and run the fuzzer: `arvo`
    - The fuzzer is pre-configured with AddressSanitizer (ASAN)
    - Dependencies and build tools are already installed
    {% else %}
    You can execute bash commands to do anything needed for reporting.
    {% endif %}

    ## Goal
    Write `final_report_{{hypothesis_id}}.md` inside {{project_path}} using the report format below.
    Use evidence from the validation output and code references.

    ## Context Packet
    {{context_packet}}

    The context packet above contains structured evidence you MUST use:
    - `sections.hypothesis`: file_path, function, title, description, trigger, preconditions, expected_crash, references
    - `sections.poc`: script_path, input_path, reproduction_command
    - `sections.validation`: crash_detected, output_excerpt, indicators, reproduction_command
    Extract concrete values from these fields to fill the report. Do NOT make up information.

    {% if reporter_hint %}
    ## Important
    {{reporter_hint}}
    {% endif %}

    IMPORTANT: Before calling `finish`, verify the file exists:
      test -f /src/final_report_{{hypothesis_id}}.md
    If it does not exist, write it first.

    When you call `finish`, do NOT include a bash block in that reply.

    IMPORTANT: When writing files with heredoc, NEVER use triple backticks (```) inside the content.
    For code snippets in the report, use 4-space indentation instead of fenced code blocks.

    IMPORTANT: Replace every placeholder below with concrete values from the context packet.
    Do NOT leave any angle-bracket placeholders in the final report.

    <bug_report_format>
    ### Vulnerability Details
    State the vulnerability type from hypothesis.title. Explain WHY it is vulnerable using hypothesis.description and hypothesis.trigger. Include the relevant code snippet from hypothesis.references (file path, line range, and surrounding context). Describe the triggering conditions from hypothesis.preconditions and hypothesis.expected_crash.
    ### Affected Target
    File: hypothesis.file_path
    Function: hypothesis.function
    (Use the actual values from the context packet, e.g., "File: src/api.cc", "Function: parse_input")
    ### PoC File
    Path: poc.input_path
    Description: explain what the PoC data contains and why it triggers the vulnerability.
    ### Build Instructions
    Provide the exact build command with sanitizer flags. Inspect the project build system if needed.
    ### Test Command
    {% if arvo_mode %}
    Use poc.reproduction_command or validation.reproduction_command (e.g., `arvo` or `./harness poc`).
    {% else %}
    Use poc.reproduction_command or validation.reproduction_command (e.g., `./harness poc`).
    {% endif %}
    ### Test Report
    Paste the actual sanitizer/crash output from validation.output_excerpt.
    List the crash indicators from validation.indicators.
    </bug_report_format>

    ## Output (structured payload)
    When done, call the `finish` tool with:
    - status: 'success' if you wrote the report file, 'failure' if you could not write it.
    - analysis: brief summary
    - report: final_report_{{hypothesis_id}}.md
    - payload: a dict containing:
      report:
        hypothesis_id: {{hypothesis_id}}
        report_path: final_report_{{hypothesis_id}}.md
        summary: short summary
        references: list of objects {file_path, line_start, line_end, function, context}

  action_observation_template: |
    <returncode>{{output.returncode}}</returncode>
    {% if output.output | length < 10000 -%}
    <output>
    {{ output.output -}}
    </output>
    {%- else -%}
    <warning>
    The output of your last command was too long.
    Please try a different command that produces less output.
    If you're looking at a file you can try use head, tail or sed to view a smaller number of lines selectively.
    If you're using grep or find and it produced too much output, you can use a more selective search pattern.
    If you really need to see something from the full command's output, you can redirect output to a file and then search in that file.
    </warning>
    {%- set elided_chars = output.output | length - 10000 -%}
    <output_head>
    {{ output.output[:5000] }}
    </output_head>
    <elided_chars>
    {{ elided_chars }} characters elided
    </elided_chars>
    <output_tail>
    {{ output.output[-5000:] }}
    </output_tail>
    {%- endif -%}

  format_error_template: |
    Your last response did not include a tool call.
    Every response MUST contain exactly one tool call via the tool-calling API.
    Available tools: `bash` (run a command) and `finish` (submit results).

  step_limit: 120
  cost_limit: 5

environment:
  timeout: 300
  env:
    PAGER: cat
    LESS: -R

model:
  model_kwargs:
    temperature: 1.0
    drop_params: true
