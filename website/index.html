// ── Run Detail ─────────────────────────────────────────────────
async function loadRunDetail(runId) {
  const app = document.getElementById('app');
  app.innerHTML = '<div class="loading"><div class="spinner"></div><br>Loading run detail...</div>';
  try {
    runDetail = await api(`/api/runs/${encodeURIComponent(runId)}`);
    renderRunDetail();
  } catch (e) {
    app.innerHTML = `<div class="empty"><div class="icon">!</div><p>Failed to load run: ${esc(e.message)}</p></div>`;
  }
}

function renderRunDetail() {
  const d = runDetail;
  const m = d.manifest;
  const counters = d.index.counters || {};

  // Compute totals
  let totalCost = 0;
  let totalCalls = 0;
  for (const t of d.trajectory_summaries || []) {
    totalCost += t.cost || 0;
    totalCalls += t.api_calls || 0;
  }

  // ── Trajectory-only view (file-scan pipeline or claude-code) ──
  if (d.trajectory_only) {
    const hasReport = !!(d.result_text);
    // Vuln Context only meaningful for legacy file-scan runs with a CVE ID.
    const showVulnContext = m.pipeline === 'file-scan';
    const tabs = ['Overview'];
    if (hasReport) tabs.push('Report');
    tabs.push('Trajectory');
    if (showVulnContext) tabs.push('Vuln Context');
    let html = `<div class="tabs" id="detail-tabs">`;
    tabs.forEach((t,i) => {
      html += `<div class="tab ${i===0?'active':''}" onclick="switchTab(${i},'detail');${t==='Vuln Context'?'loadVulnContext()':''}">${t}</div>`;
    });
    html += `</div>`;

    // Tab 0: Overview — just the raw manifest for reference. Counters live in
    // the run list; this page is for trajectory reading.
    let tabIdx = 0;
    html += `<div class="tab-panel active" id="detail-tab-${tabIdx}">`;
    html += `<div class="section-title">Run Info</div>`;
    html += `<pre>${esc(JSON.stringify(m, null, 2))}</pre>`;
    html += `</div>`;
    tabIdx++;

    // Report tab (claude-code only)
    if (hasReport) {
      html += `<div class="tab-panel" id="detail-tab-${tabIdx}">`;
      html += `<div class="card" style="max-width:900px"><div class="md-render">${renderMarkdown(d.result_text)}</div></div>`;
      html += `</div>`;
      tabIdx++;
    }

    // Trajectory tab
    html += `<div class="tab-panel" id="detail-tab-${tabIdx}">`;
    html += renderInlineTrajectory(d.inline_messages || []);
    html += `</div>`;
    tabIdx++;

    // Vuln Context tab (lazy loaded) — file-scan only
    if (showVulnContext) {
      html += `<div class="tab-panel" id="detail-tab-${tabIdx}">`;
      html += `<div id="vuln-context-container"><div class="loading"><div class="spinner"></div><br>Click to load vulnerability context...</div></div>`;
      html += `</div>`;
    }

    document.getElementById('app').innerHTML = html;
    return;
  }

  // ── Revelio scan_filter_detect view ──
  if (d.revelio) {
    renderRevelioDetail(d, m);
    return;
  }

  // ── Standard multi-agent pipeline view ──
  const tabs = ['Overview','Code Review','Hypotheses','Trajectories','Log'];
  let html = `<div class="tabs" id="detail-tabs">`;
  tabs.forEach((t,i) => {
    html += `<div class="tab ${i===0?'active':''}" onclick="switchTab(${i},'detail')">${t}</div>`;
  });
  html += `</div>`;

  // ── Tab 0: Overview
  html += `<div class="tab-panel active" id="detail-tab-0">`;
  html += `<div class="overview-grid">`;
  html += statCard(m.target_ref || '—', 'Target');
  html += statCard((m.model_name||'').split('/').pop(), 'Model');
  html += statCard(counters.hypotheses || 0, 'Hypotheses');
  html += statCard(counters.validation || 0, 'Validations');
  html += statCard('$' + totalCost.toFixed(2), 'Total Cost');
  html += statCard(totalCalls, 'API Calls');
  html += `</div>`;

  // Timeline
  html += `<div class="section-title">Timeline</div>`;
  html += `<div class="timeline">`;
  for (const ev of d.events) {
    const cls = ev.event === 'run_start' ? 'start' : ev.event.includes('success') ? 'success' : 'attempt';
    const ts = ev.timestamp ? new Date(ev.timestamp).toLocaleTimeString() : '';
    const payload = ev.payload ? Object.entries(ev.payload).map(([k,v])=>`${k}: ${v}`).join(', ') : '';
    html += `<div class="ev ${cls}"><span class="ts">${ts}</span><strong>${esc(ev.event)}</strong> ${payload ? `<span style="color:var(--text-dim);margin-left:.5rem">${esc(payload)}</span>` : ''}</div>`;
  }
  html += `</div>`;

  // Manifest details
  html += `<div class="section-title">Manifest</div>`;
  html += `<pre>${esc(JSON.stringify(m, null, 2))}</pre>`;
  html += `</div>`;

  // ── Tab 1: Code Review
  html += `<div class="tab-panel" id="detail-tab-1">`;
  const reviews = d.artifacts.code_review || [];
  if (reviews.length === 0) {
    html += `<div class="empty"><p>No code review artifacts found.</p></div>`;
  } else {
    for (const cr of reviews) {
      if (cr.data) {
        const data = cr.data;
        html += `<div class="card"><h3>Summary</h3><p>${esc(data.summary)}</p></div>`;

        // Files reviewed
        if (data.files_reviewed && data.files_reviewed.length) {
          html += `<div class="section-title">Files Reviewed <span class="count">${data.files_reviewed.length}</span></div>`;
          html += `<div style="display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1.5rem">`;
          for (const f of data.files_reviewed) {
            html += `<span class="badge badge-purple">${esc(f)}</span>`;
          }
          html += `</div>`;
        }

        // Harness
        if (data.harness_entry) {
          html += `<div class="card"><h3>Harness Entry</h3><p><code>${esc(data.harness_entry)}</code></p></div>`;
        }

        // Call chains
        if (data.call_chains && data.call_chains.length) {
          html += `<div class="section-title">Call Chains <span class="count">${data.call_chains.length}</span></div>`;
          for (const chain of data.call_chains) {
            const parts = chain.split(' -> ');
            html += `<div class="call-chain">${parts.map(p => esc(p)).join(' <span class="arrow">-></span> ')}</div>`;
          }
          html += `<br>`;
        }

        // Hotspots
        if (data.hotspots && data.hotspots.length) {
          html += `<div class="section-title">Hotspots <span class="count">${data.hotspots.length}</span></div>`;
          for (const h of data.hotspots) {
            html += `<div class="hotspot">`;
            html += `<div class="fn">${esc(h.function || '—')}</div>`;
            html += `<div class="loc">${esc(h.file_path || '')}:${h.line_start||'?'}-${h.line_end||'?'}</div>`;
            html += `<div class="ctx">${esc(h.context || '')}</div>`;
            html += `</div>`;
          }
        }

        // Warnings
        if (data.warnings && data.warnings.length) {
          html += `<div class="section-title">Warnings <span class="count">${data.warnings.length}</span></div>`;
          for (const w of data.warnings) {
            html += `<div class="card"><p>${esc(w)}</p></div>`;
          }
        }
      }
    }
  }
  html += `</div>`;

  // ── Tab 2: Hypotheses
  html += `<div class="tab-panel" id="detail-tab-2">`;
  html += renderHypotheses(d);
  html += `</div>`;

  // ── Tab 3: Trajectories
  html += `<div class="tab-panel" id="detail-tab-3">`;
  html += renderTrajectories(d);
  html += `</div>`;

  // ── Tab 4: Log
  html += `<div class="tab-panel log-tab-panel" id="detail-tab-4">${renderLogTab(d.log)}</div>`;

  document.getElementById('app').innerHTML = html;
  applyLogSearch();
}

// ── Revelio detail renderer ────────────────────────────────────
function jsStr(s) {
  return (s || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

function messagesToSteps(messages) {
  const steps = [];
  let current = [];
  for (const msg of messages || []) {
    if (msg.role === 'assistant' && current.length) {
      steps.push(current);
      current = [];
    }
    current.push(msg);
  }
  if (current.length) steps.push(current);
  return steps;
}

function revelioMatchesSearch(text, query) {
  if (!query) return true;
  return (text || '').toLowerCase().includes(query.toLowerCase());
}

function highlightSearchText(text, query) {
  const safe = esc(text || '');
  if (!query) return safe;
  const re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return safe.replace(re, '<span class="search-hit">$1</span>');
}

function highlightShell(text) {
  let s = esc(text || '');
  s = s.replace(/(#.*)$/gm, '<span class="hl-cmt">$1</span>');
  s = s.replace(/\b(\d+)\b/g, '<span class="hl-num">$1</span>');
  s = s.replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g, '<span class="hl-str">$1</span>');
  return s;
}

function formatAssistantContent(content, query) {
  const parts = (content || '').split(/(```[\s\S]*?```)/g);
  return parts.map(part => {
    if (part.startsWith('```') && part.endsWith('```')) {
      const inner = part.slice(3, -3);
      const nl = inner.indexOf('\n');
      const code = nl >= 0 ? inner.slice(nl + 1) : inner;
      return `<pre class="cmd-output">${highlightShell(code)}</pre>`;
    }
    return `<div class="content">${highlightSearchText(part, query)}</div>`;
  }).join('');
}

function renderRevelioFunnel(funnel) {
  if (!funnel) return '';
  const refinementSteps = [
    { key: 'raw', label: 'Raw pool' },
    { key: 'after_classify', label: 'In-scope' },
    { key: 'after_dedup', label: 'Merged' },
    { key: 'after_static_filter', label: 'Static filtered' },
    { key: 'after_rank', label: 'Ranked queue' },
  ];
  const pocSteps = [
    { key: 'poc_attempted', label: 'PoV tried' },
    { key: 'confirmed', label: 'Confirmed' },
  ];
  let bar = '';
  const renderStep = (st) => {
    const failed = st.key === 'after_static_filter' && funnel.filter_stage_failed;
    let title = '';
    if (failed) {
      title = ' title="Static filter stage never completed — every call errored out (e.g. an API auth failure). This is not a real count."';
    } else if (st.key === 'after_static_filter') {
      title = ' title="Hypotheses not dropped at static filtering, including unresolved filter reviews."';
    } else if (st.key === 'after_rank') {
      title = ' title="Final ranked output (top-n), from hypotheses.json."';
    }
    bar += `<div class="funnel-step${failed ? ' funnel-step-failed' : ''}"${title}>`;
    bar += failed
      ? `<span class="num funnel-failed">⚠</span>`
      : `<span class="num">${funnel[st.key] ?? '—'}</span>`;
    bar += `<span class="lbl">${esc(st.label)}</span></div>`;
  };
  refinementSteps.forEach((st, i) => {
    if (i) bar += '<span class="funnel-arrow">→</span>';
    renderStep(st);
  });
  bar += '<span class="funnel-arrow">→</span>';
  pocSteps.forEach((st, i) => {
    if (i) bar += '<span class="funnel-arrow">→</span>';
    renderStep(st);
  });
  return `<div class="section-title funnel-title">Hypothesis Funnel</div><div class="funnel-subtitle">Hypothesis refinement · then PoV validation</div><div class="funnel-wrap"><div class="funnel-bar">${bar}</div></div>`;
}

function cleanStageLabel(label) {
  if (!label) return '—';
  const cleaned = String(label)
    .replace(/^stage1\s*·\s*/i, '')
    .replace(/^stage3\s+filter\s*·\s*/i, '')
    .replace(/^stage2\s*·\s*/i, '')
    .trim();
  return cleaned || label;
}

function splitFirstSentence(text) {
  const t = (text || '').trim();
  if (!t) return { lead: '', rest: '' };
  const m = t.match(/^(.+?[.!?])(?:\s+(.*))?$/s);
  if (m) return { lead: m[1].trim(), rest: (m[2] || '').trim() };
  return { lead: t, rest: '' };
}

function revelioEventLabel(event) {
  const labels = {
    run_start: 'Run started',
    scan_filter_start: 'Pipeline started',
    scan_filter_end: 'Pipeline finished',
    file_hypothesis_completed: 'File scanned',
    filter_agent_completed: 'Hypothesis verified',
    no_hypotheses: 'No hypotheses survived',
    poc_start: 'PoV started',
    run_success: 'PoV confirmed',
    run_success_all: 'All PoV confirmed',
    run_failure: 'Run failed',
  };
  return labels[event] || (event || '').replace(/_/g, ' ');
}

function prettifyRevelioLog(msg) {
  return msg
    .replace(/\[scan_filter\]/g, '[revelio]')
    .replace(/Scan-filter pipeline/gi, 'Revelio pipeline');
}

function buildRevelioTimelineMilestones(events, funnel) {
  funnel = funnel || {};
  events = events || [];
  const byType = {};
  for (const ev of events) {
    const k = ev.event || '';
    (byType[k] ||= []).push(ev);
  }
  const first = (type) => byType[type]?.[0];
  const last = (type) => {
    const a = byType[type];
    return a?.[a.length - 1];
  };
  const count = (type) => (byType[type] || []).length;

  const milestones = [];
  const add = (label, detail, ev, cls) => {
    milestones.push({ label, detail: detail || '', timestamp: ev?.timestamp || '', cls: cls || 'attempt' });
  };

  if (first('run_start')) add('Run started', '', first('run_start'), 'start');
  if (first('scan_filter_start')) add('Pipeline started', '', first('scan_filter_start'), 'start');

  const fileCount = count('file_hypothesis_completed');
  if (fileCount) {
    const lastFile = last('file_hypothesis_completed');
    const progress = lastFile?.payload?.progress;
    add(`Files scanned (${fileCount})`, progress ? `progress: ${progress}` : '', lastFile, 'attempt');
  }

  const filterCount = count('filter_agent_completed');
  if (filterCount) add(`Static filtering (${filterCount})`, '', last('filter_agent_completed'), 'attempt');

  const endEv = first('scan_filter_end');
  if (endEv) {
    const p = endEv.payload || {};
    const parts = [];
    if (p.total_hypotheses != null) parts.push(`total_hypotheses: ${p.total_hypotheses}`);
    if (p.files_scanned != null) parts.push(`files_scanned: ${p.files_scanned}`);
    if (p.total_cost != null) parts.push(`total_cost: $${Number(p.total_cost).toFixed(2)}`);
    add('Pipeline finished', parts.join(', '), endEv, 'success');
  }

  if (first('no_hypotheses')) add('No hypotheses survived', '', first('no_hypotheses'), 'attempt');

  const pocCount = count('poc_start');
  if (pocCount) {
    const confirmed = funnel.confirmed ?? count('run_success');
    add(`PoV tried (${pocCount})`, `${confirmed} confirmed`, first('poc_start'), 'attempt');
  }

  if (first('run_success_all')) {
    const p = first('run_success_all').payload || {};
    add('All PoV confirmed', p.count != null ? `count: ${p.count}` : '', first('run_success_all'), 'success');
  } else {
    const successCount = count('run_success');
    if (successCount === 1) {
      const hid = first('run_success')?.payload?.hypothesis_id;
      add('PoV confirmed', hid ? String(hid) : '', first('run_success'), 'success');
    } else if (successCount > 1) {
      add(`PoV confirmed (${successCount})`, '', last('run_success'), 'success');
    }
  }
  if (first('run_failure')) add('Run failed', '', first('run_failure'), 'attempt');

  return milestones;
}

function renderRevelioTimeline(events, funnel) {
  const milestones = buildRevelioTimelineMilestones(events, funnel);
  if (!milestones.length) return '';
  let html = '<div class="section-title">Timeline</div><div class="timeline">';
  for (const m of milestones) {
    const ts = m.timestamp ? new Date(m.timestamp).toLocaleTimeString() : '';
    html += `<div class="ev ${m.cls}"><span class="ts">${ts}</span><strong>${esc(m.label)}</strong>`;
    if (m.detail) html += ` <span style="color:var(--text-dim);margin-left:.5rem">${esc(m.detail)}</span>`;
    html += '</div>';
  }
  return html + '</div>';
}

function pipelineNotReachedBadge(label) {
  return `<span class="pipeline-badge not-reached">${esc(label || 'Skipped')}</span>`;
}

function stageNotReachedNotice(message) {
  return `<p class="stage-notice">${esc(message)}</p>`;
}

function gateNotReached(gate) {
  return !gate || gate.status === 'skipped';
}

function pocNotReached(poc) {
  return !poc || poc.status === 'skipped';
}

function pipelineStatusBadge(gate) {
  if (gateNotReached(gate)) return pipelineNotReachedBadge('Skipped');
  if (gate.status === 'kept') {
    const extra = gate.verdict_label || gate.verdict || '';
    const label = extra && extra !== 'kept' ? `KEPT · ${extra}` : 'KEPT';
    return `<span class="pipeline-badge kept">${esc(label)}</span>`;
  }
  return '<span class="pipeline-badge dropped">DROPPED</span>';
}

function pipelineFinalBadge(row) {
  const dup = row.final && row.final.duplicate_of
    ? ` <span class="pipeline-badge dup" title="Same crash signature as an earlier-confirmed finding">Duplicate of ${esc(row.final.duplicate_of)}</span>`
    : '';
  const warn = row.final && row.final.crash_confidence === 'generic'
    ? ` <span class="pipeline-badge warn" title="No sanitizer banner or stack trace — crash location is unverified">⚠ Unattributed crash</span>`
    : '';
  if (row.final && row.final.confirmed) return `<span class="pipeline-badge survived">CONFIRMED</span>${dup}${warn}`;
  if (row.final && row.final.survived) return '<span class="pipeline-badge survived">SURVIVED</span>';
  if (row.dropped_at) return '<span class="pipeline-badge dropped">OUT</span>';
  return pipelineNotReachedBadge('Pending');
}

function pipelineHid(row) {
  // row.hid is a synthetic per-file display number (classify index based) —
  // it is NOT globally unique and can collide with a real hid from a totally
  // different hypothesis/PoV (every file's first hypothesis is "SF01"). Only
  // global_hid is a reliable identity for matching against PoV stages; never
  // fall back to row.hid here or a dropped/unresolved row can end up linked
  // to an unrelated hypothesis's PoV.
  return row.global_hid || '';
}

function pipelineDropReason(row) {
  if (row.dropped_at === 'classify') return row.classify && row.classify.reason;
  if (row.dropped_at === 'dedup') return row.dedup && row.dedup.reason;
  if (row.dropped_at === 'filter') return row.filter && row.filter.reason;
  return '';
}

function pipelineDropStageLabel(droppedAt) {
  return ({ classify: 'triage', dedup: 'dedup', filter: 'static filtering' })[droppedAt] || droppedAt || '';
}

function pipelineRowMatchesSearch(row, query) {
  if (!query) return true;
  const q = query.toLowerCase().trim();
  if (!q) return true;
  const hay = [
    row.summary, pipelineHid(row), row.hid, row.file, pipelineDropReason(row),
    row.classify && row.classify.reason,
    row.dedup && row.dedup.reason,
    row.filter && row.filter.reason,
  ].join(' ').toLowerCase();
  return hay.includes(q);
}

function isHypothesisConfirmed(row) {
  return !!(row.final && row.final.confirmed);
}

// Neither dropped at any gate nor confirmed survived — e.g. the filter stage
// hit an environment error (couldn't access the container to verify) and
// never reached a real verdict either way.
function isHypothesisUnresolved(row) {
  return !row.dropped_at && !(row.final && row.final.survived);
}

function hypothesisFiles(pipeline) {
  const files = [];
  const seen = new Set();
  for (const r of pipeline || []) {
    const f = r.file || 'unknown';
    if (!seen.has(f)) {
      seen.add(f);
      files.push(f);
    }
  }
  return files.sort();
}

function fileBaseName(file) {
  const parts = (file || '').split('/');
  return parts[parts.length - 1] || file || 'unknown';
}

function fileHypothesisCounts(pipeline) {
  const counts = new Map();
  for (const r of pipeline || []) {
    const f = r.file || 'unknown';
    counts.set(f, (counts.get(f) || 0) + 1);
  }
  return counts;
}

function defaultHypothesisListFilter(pipeline) {
  pipeline = pipeline || [];
  if (pipeline.filter(isHypothesisConfirmed).length) return { mode: 'confirmed', file: '' };
  if (pipeline.filter(r => r.final && r.final.survived).length) return { mode: 'survived', file: '' };
  return { mode: 'all', file: '' };
}

function hypothesisScopeRows() {
  let rows = revelioPipeline || [];
  if (hypothesisListFilter.file) {
    rows = rows.filter(r => (r.file || 'unknown') === hypothesisListFilter.file);
  }
  return rows;
}

function defaultHypothesisModeForRows(rows) {
  rows = rows || [];
  if (rows.filter(isHypothesisConfirmed).length) return 'confirmed';
  if (rows.filter(r => r.final && r.final.survived).length) return 'survived';
  if (rows.filter(r => r.dropped_at).length) return 'dropped';
  return 'survived';
}

function renderHypothesisFilterButtons() {
  const scope = hypothesisScopeRows();
  const dropped = scope.filter(r => r.dropped_at).length;
  const survived = scope.filter(r => r.final && r.final.survived).length;
  const confirmed = scope.filter(isHypothesisConfirmed).length;
  const unresolved = scope.filter(isHypothesisUnresolved).length;
  const mode = hypothesisListFilter.mode;
  let html = '';
  html += `<button type="button" class="${mode === 'all' ? 'active' : ''}" onclick="revelioHypothesisFilter('all',this)">All (${scope.length})</button>`;
  html += `<button type="button" class="${mode === 'dropped' ? 'active' : ''}" onclick="revelioHypothesisFilter('dropped',this)">Dropped (${dropped})</button>`;
  html += `<button type="button" class="${mode === 'survived' ? 'active' : ''}" onclick="revelioHypothesisFilter('survived',this)">Survived (${survived})</button>`;
  if (unresolved) {
    html += `<button type="button" class="${mode === 'unresolved' ? 'active' : ''}" onclick="revelioHypothesisFilter('unresolved',this)" title="Filter stage hit an environment error and never reached a real verdict for these">Unresolved (${unresolved})</button>`;
  }
  html += `<button type="button" class="${mode === 'confirmed' ? 'active' : ''}" onclick="revelioHypothesisFilter('confirmed',this)">Confirmed (${confirmed})</button>`;
  return html;
}

function refreshHypothesisFilterBar() {
  const el = document.getElementById('hyp-list-filters');
  if (el) el.innerHTML = renderHypothesisFilterButtons();
}

function groupRowsByFile(rows) {
  const map = new Map();
  for (const r of rows) {
    const f = r.file || 'unknown';
    if (!map.has(f)) map.set(f, []);
    map.get(f).push(r);
  }
  return map;
}

function getFilteredHypothesisRows() {
  let rows = revelioPipeline || [];
  if (hypothesisListFilter.mode === 'dropped') rows = rows.filter(r => r.dropped_at);
  else if (hypothesisListFilter.mode === 'survived') rows = rows.filter(r => r.final && r.final.survived);
  else if (hypothesisListFilter.mode === 'unresolved') rows = rows.filter(isHypothesisUnresolved);
  else if (hypothesisListFilter.mode === 'confirmed') rows = rows.filter(isHypothesisConfirmed);
  if (hypothesisListFilter.file) rows = rows.filter(r => (r.file || 'unknown') === hypothesisListFilter.file);
  if (revelioSearchQuery) rows = rows.filter(r => pipelineRowMatchesSearch(r, revelioSearchQuery));
  return rows;
}

function hypothesisKey(row) {
  return `${row.file || ''}::${row.index}`;
}

function findPipelineRow(key) {
  return (revelioPipeline || []).find(r => hypothesisKey(r) === key) || null;
}

function findPipelineRowByHid(hid) {
  if (!hid) return null;
  return (revelioPipeline || []).find(r => pipelineHid(r) === hid) || null;
}

function findClassification(file, index) {
  for (const cf of revelioStage2Classify || []) {
    if (cf.file !== file) continue;
    return (cf.classifications || []).find(c => c.index === index) || null;
  }
  return null;
}

function findStage3TraceForRow(row) {
  if (!row) return null;
  const stages = revelioHypothesisStages || [];
  if (row.stage3_trace_key) {
    return stages.find(s => s.stage_key === row.stage3_trace_key) || null;
  }
  const file = row.file || '';
  const norm = (row.summary || '').trim().toLowerCase().replace(/\s+/g, ' ');
  if (!file || !norm) return null;
  const matches = stages.filter(s => {
    if (s.stage !== 'stage3.filter') return false;
    const info = s.info || {};
    const sNorm = (info.summary || '').trim().toLowerCase().replace(/\s+/g, ' ');
    return info.file === file && sNorm === norm;
  });
  if (matches.length === 1) return matches[0];
  const filt = row.filter || {};
  if (filt.verdict) {
    const narrowed = matches.filter(s => {
      const info = s.info || {};
      if (info.verdict !== filt.verdict) return false;
      const a = (filt.reason || '').trim();
      const b = (info.reason || '').trim();
      if (!a || !b) return true;
      return a === b || a.slice(0, 160) === b.slice(0, 160) || b.includes(a.slice(0, 80)) || a.includes(b.slice(0, 80));
    });
    if (narrowed.length === 1) return narrowed[0];
    if (narrowed.length) return narrowed[0];
  }
  return matches[0] || null;
}

function findStage1ForFile(file) {
  if (!file) return [];
  return (revelioHypothesisStages || []).filter(s =>
    (s.stage || '').startsWith('stage1') && (s.label || '').includes(`(${file})`),
  );
}

function renderHypothesisTabShell(pipeline) {
  pipeline = pipeline || [];
  const files = hypothesisFiles(pipeline);
  const fileCounts = fileHypothesisCounts(pipeline);
  let html = `<div class="hyp-master-detail${hypSidebarCollapsed ? ' sidebar-collapsed' : ''}" id="revelio-hyp-tab">`;
  html += `<button type="button" class="hyp-sidebar-toggle" title="${hypSidebarCollapsed ? 'Expand' : 'Collapse'} sidebar" onclick="toggleSidebarCollapse('revelio-hyp-tab','hyp')">${hypSidebarCollapsed ? '›' : '‹'}</button>`;
  html += '<aside class="hyp-list-pane" id="revelio-hyp-list">';
  html += '<div class="hyp-list-toolbar">';
  if (files.length > 1) {
    html += `<select class="hyp-file-select" id="hyp-file-filter" onchange="revelioHypothesisFileFilter(this.value)">`;
    html += `<option value=""${hypothesisListFilter.file ? '' : ' selected'}>All files (${files.length})</option>`;
    for (const f of files) {
      html += `<option value="${esc(f)}"${hypothesisListFilter.file === f ? ' selected' : ''}>${esc(fileBaseName(f))} (${fileCounts.get(f) || 0})</option>`;
    }
    html += '</select>';
  }
  html += '<div class="pipeline-filter-btns" id="hyp-list-filters">';
  html += renderHypothesisFilterButtons();
  html += '</div></div>';
  html += '<div class="hyp-list-scroll" id="hyp-list-items"></div>';
  html += '</aside>';
  html += '<main class="hyp-detail-pane" id="revelio-hyp-detail"></main>';
  html += '</div>';
  return html;
}

function renderHypothesisListItem(row) {
  const key = hypothesisKey(row);
  const active = key === selectedHypothesisKey ? ' active' : '';
  const { lead } = splitFirstSentence(row.summary || '');
  let item = `<div class="hyp-list-item${active}" data-hyp-key="${esc(key)}" onclick="selectHypothesis('${jsStr(key)}')">`;
  item += '<div class="hyp-list-meta">';
  item += `<span style="font-size:.72rem;color:var(--text-dim)">#${row.index != null ? row.index + 1 : '—'}</span>`;
  if (pipelineHid(row)) item += `<span class="badge badge-cyan">${esc(pipelineHid(row))}</span>`;
  item += pipelineFinalBadge(row);
  item += '</div>';
  item += `<div class="hyp-list-summary">${esc(lead || row.summary || '—')}</div>`;
  return item + '</div>';
}

function renderHypothesisListItems(rows) {
  if (!rows.length) return '<div class="hyp-detail-empty" style="min-height:8rem"><p>No hypotheses match your filters.</p></div>';
  if (hypothesisListFilter.file) return rows.map(renderHypothesisListItem).join('');
  const byFile = groupRowsByFile(rows);
  const files = [...byFile.keys()].sort();
  let html = '';
  files.forEach((file, fi) => {
    const fileRows = byFile.get(file) || [];
    const open = files.length === 1 || fileRows.some(r => hypothesisKey(r) === selectedHypothesisKey) || (!selectedHypothesisKey && fi === 0);
    html += `<details class="hyp-file-group"${open ? ' open' : ''}>`;
    html += `<summary><span class="chevron chevron-right"></span><span class="hyp-file-name" title="${esc(file)}">${esc(fileBaseName(file))}</span>`;
    html += `<span class="hyp-file-count">${fileRows.length}</span></summary>`;
    html += `<div class="hyp-file-items">${fileRows.map(renderHypothesisListItem).join('')}</div></details>`;
  });
  return html;
}

function refreshHypothesisList() {
  const list = document.getElementById('hyp-list-items');
  if (!list) return;
  const rows = getFilteredHypothesisRows();
  list.innerHTML = renderHypothesisListItems(rows);
}

function refreshHypothesisTab() {
  refreshHypothesisFilterBar();
  refreshHypothesisList();
  const rows = getFilteredHypothesisRows();
  if (selectedHypothesisKey && rows.some(r => hypothesisKey(r) === selectedHypothesisKey)) {
    selectHypothesis(selectedHypothesisKey, false);
  } else if (rows.length) {
    selectHypothesis(hypothesisKey(rows[0]), false);
  } else {
    selectedHypothesisKey = null;
    const detail = document.getElementById('revelio-hyp-detail');
    if (detail) detail.innerHTML = '<div class="hyp-detail-empty"><p>No hypotheses match your filters.</p></div>';
  }
}

function revelioHypothesisFilter(mode, btn) {
  hypothesisListFilter = { ...hypothesisListFilter, mode };
  refreshHypothesisTab();
}

function revelioHypothesisFileFilter(file) {
  const next = { ...hypothesisListFilter, file: file || '' };
  if (file && next.mode === 'all') {
    next.mode = defaultHypothesisModeForRows(
      (revelioPipeline || []).filter(r => (r.file || 'unknown') === file),
    );
  }
  hypothesisListFilter = next;
  refreshHypothesisTab();
}

function selectHypothesis(key, scrollList) {
  if (scrollList == null) scrollList = true;
  selectedHypothesisKey = key;
  document.querySelectorAll('.hyp-list-item').forEach(el => {
    el.classList.toggle('active', el.dataset.hypKey === key);
  });
  const row = findPipelineRow(key);
  const detail = document.getElementById('revelio-hyp-detail');
  if (!detail) return;
  if (!row) {
    detail.innerHTML = '<div class="hyp-detail-empty"><p>Select a hypothesis to view its pipeline.</p></div>';
    return;
  }
  detail.innerHTML = renderHypothesisDetail(row);
  if (currentHypGateCtx) {
    loadAlwaysOpenGateTrace(currentHypGateCtx);
    equalizeHypGatePanelHeight(currentHypGateCtx);
    currentHypTraceBodyId = currentHypGateCtx.s3 ? `hyp-s3-${currentHypGateCtx.keySlug}-0-body` : null;
    applyTraceMinHeight(currentHypTraceBodyId);
    // Re-measure one frame later — the very first measurement can race the
    // browser's own layout pass (freshly inserted DOM, fallback-font metrics
    // before a webfont swap), which is what made the reserved height
    // intermittently wrong instead of consistently wrong.
    requestAnimationFrame(() => {
      if (currentHypGateCtx) equalizeHypGatePanelHeight(currentHypGateCtx);
      applyTraceMinHeight(currentHypTraceBodyId);
    });
    if (document.fonts && document.fonts.status !== 'loaded') {
      document.fonts.ready.then(() => {
        hypGateGlobalMaxHeight = null;
        if (currentHypGateCtx) equalizeHypGatePanelHeight(currentHypGateCtx);
        applyTraceMinHeight(currentHypTraceBodyId);
      });
    }
  }
  if (scrollList) {
    const active = document.querySelector('.hyp-list-item.active');
    if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
}

function hypGateDefs(row) {
  return [
    { key: 'raw', label: 'Raw', badge: '<span class="pipeline-badge kept">IN</span>', notReached: false, hasPanel: false },
    { key: 'inscope', label: 'In-scope', badge: pipelineStatusBadge(row.classify), notReached: gateNotReached(row.classify), hasPanel: true },
    { key: 'merged', label: 'Merged', badge: pipelineStatusBadge(row.dedup), notReached: gateNotReached(row.dedup), hasPanel: true },
    { key: 'filter', label: 'Static filter', badge: pipelineStatusBadge(row.filter), notReached: gateNotReached(row.filter), hasPanel: true },
    { key: 'poc', label: 'PoV', badge: renderPocStatusBadge(row.poc), notReached: pocNotReached(row.poc), hasPanel: true },
    { key: 'final', label: 'Final', badge: pipelineFinalBadge(row), notReached: !row.final?.confirmed && !row.final?.survived && !row.dropped_at, hasPanel: true },
  ];
}

// Opens on whichever gate is most relevant: the furthest-reached one, so a
// confirmed hypothesis lands on "Final" and a dropped one lands on wherever
// it was dropped, instead of always forcing a click to see what matters.
function pickDefaultHypGate(gates, row) {
  // If it was dropped somewhere before PoV, jump straight to that gate —
  // "Final" technically isn't marked not-reached for dropped rows (it's
  // just "not confirmed"), so without this a dropped-at-triage hypothesis
  // would default to the least useful, empty-looking "Final" panel.
  const dropGate = { classify: 'inscope', dedup: 'merged', filter: 'filter' }[row?.dropped_at];
  if (dropGate) return dropGate;
  const order = ['final', 'poc', 'filter', 'merged', 'inscope'];
  for (const key of order) {
    const g = gates.find(x => x.key === key);
    if (g && g.hasPanel && !g.notReached) return key;
  }
  return 'inscope';
}

function renderHypothesisStepper(row, activeKey) {
  const gates = hypGateDefs(row);
  let html = '<div class="hyp-stepper">';
  gates.forEach((st, i) => {
    if (i) html += '<span class="hyp-stepper-arrow">→</span>';
    const cls = ['hyp-stepper-step'];
    if (st.notReached) cls.push('not-reached');
    if (st.hasPanel) cls.push('clickable');
    if (st.key === activeKey) cls.push('gate-active');
    const onclick = st.hasPanel ? ` onclick="selectHypGate('${jsStr(st.key)}')"` : '';
    html += `<div class="${cls.join(' ')}" data-gate="${st.key}"${onclick}>${st.badge}<span class="lbl">${esc(st.label)}</span></div>`;
  });
  return html + '</div>';
}

function renderHypGatePanelContent(ctx, key) {
  const { row, c, s3, keySlug } = ctx;
  if (key === 'inscope') {
    const verdict = c.verdict_label || (row.classify && row.classify.verdict_label) || '?';
    let html = '<div class="hyp-detail-meta">';
    html += '<div class="hyp-badge-group"><span class="hyp-group-label">Finding</span>';
    html += `<span class="badge ${verdict === 'NOT' ? 'badge-orange' : 'badge-green'}">${esc(verdict)}</span>`;
    if (c.severity) html += `<span class="badge badge-purple">${esc(c.severity)}</span>`;
    html += '</div>';
    html += '<div class="hyp-badge-group hyp-badge-group-gates"><span class="hyp-group-label">Gate</span>';
    html += pipelineStatusBadge(row.classify);
    html += '</div></div>';
    const classifyReason = c.reason || (row.classify && row.classify.reason) || '';
    if (classifyReason) html += `<p class="hyp-detail-body">${esc(classifyReason)}</p>`;
    else if (row.classify && row.classify.status === 'kept') html += '<p class="hyp-detail-body">Kept in scope after triage.</p>';
    return html;
  }
  if (key === 'merged') {
    let html = `<div class="hyp-detail-meta">${pipelineStatusBadge(row.dedup)}</div>`;
    if (row.dedup && row.dedup.reason) html += `<p class="hyp-detail-body">${esc(row.dedup.reason)}</p>`;
    else if (row.dedup && row.dedup.status === 'skipped') html += '<p class="hyp-detail-body">Dedup skipped — dropped at triage.</p>';
    else html += '<p class="hyp-detail-body">Kept through dedup — no similar hypothesis found.</p>';
    return html;
  }
  if (key === 'filter') {
    if (!row.filter || row.filter.status === 'skipped') return stageNotReachedNotice('Did not reach static filtering.');
    let html = `<div class="hyp-detail-meta">${pipelineStatusBadge(row.filter)}</div>`;
    // The trace below (always visible, independent of which gate is
    // selected) shows the full reasoning inline, so this is just a short
    // pointer to it rather than repeating the whole thing twice.
    html += `<p class="hyp-detail-body">${row.filter.reason ? esc(row.filter.reason) : 'Reviewed independently by a static-analysis sub-agent — see its reasoning and full trace below.'}</p>`;
    return html;
  }
  if (key === 'poc' || key === 'final') {
    const hid = pipelineHid(row);
    let html = `<div class="hyp-detail-meta">${renderPocStatusBadge(row.poc)} ${pipelineFinalBadge(row)}</div>`;
    if (hid && findPocStageByHid(hid)) html += `<div class="hyp-detail-actions">${viewPocButton(hid)}</div>`;
    else if (hid) html += stageNotReachedNotice('PoV not run.');
    if (row.dropped_at) html += `<p class="hyp-detail-body">Dropped at ${esc(pipelineDropStageLabel(row.dropped_at))}.</p>`;
    return html;
  }
  return '';
}

function selectHypGate(key) {
  if (!currentHypGateCtx) return;
  document.querySelectorAll('.hyp-stepper-step[data-gate]').forEach(el => {
    el.classList.toggle('gate-active', el.dataset.gate === key);
  });
  const panel = document.getElementById('hyp-gate-panel');
  if (panel) panel.innerHTML = renderHypGatePanelContent(currentHypGateCtx, key);
}

// The reserved height used to be measured per-hypothesis (max across that
// row's own gates), which meant the card visibly resized every time you
// clicked to a *different* hypothesis in the list, not just when switching
// gates within one — from the user's seat that read as "still not
// constant". Measured across every hypothesis in the run instead, cached
// until the pipeline or viewport width changes, so the card is one fixed
// height no matter which hypothesis or gate is showing.
let hypGateGlobalMaxHeight = null;
let hypGateGlobalMaxForPipeline = null;

function computeHypGateGlobalMaxHeight(panel) {
  const originalHTML = panel.innerHTML;
  panel.style.minHeight = '';
  let max = 0;
  for (const row of (revelioPipeline || [])) {
    const ctx = { row, c: findClassification(row.file, row.index) || {}, s3: null, keySlug: '' };
    for (const g of hypGateDefs(row)) {
      if (!g.hasPanel) continue;
      panel.innerHTML = renderHypGatePanelContent(ctx, g.key);
      max = Math.max(max, panel.scrollHeight);
    }
  }
  panel.innerHTML = originalHTML;
  return max;
}

function equalizeHypGatePanelHeight(ctx) {
  const panel = document.getElementById('hyp-gate-panel');
  if (!panel) return;
  if (hypGateGlobalMaxForPipeline !== revelioPipeline || !hypGateGlobalMaxHeight) {
    const measured = computeHypGateGlobalMaxHeight(panel);
    // A 0 means this measurement ran while the Hypothesis tab (or the whole
    // page) wasn't actually visible yet (e.g. Overview is still the active
    // tab), so every scrollHeight read as 0 — don't lock that in as "the"
    // height, leave the cache empty so the next real measurement can fill it.
    if (measured > 0) {
      hypGateGlobalMaxHeight = measured;
      hypGateGlobalMaxForPipeline = revelioPipeline;
    }
  }
  if (hypGateGlobalMaxHeight) panel.style.minHeight = hypGateGlobalMaxHeight + 'px';
}

// The static-filter trace is always visible (not tied to which gate is
// selected above), and is no longer a click-to-expand accordion either — so
// its data has to be fetched as soon as it's in the DOM instead of waiting
// for a toggle click.
function loadAlwaysOpenGateTrace(ctx) {
  if (!ctx.s3) return;
  const idKey = `hyp-s3-${ctx.keySlug}-0`;
  const stageKey = ctx.s3.stage_key || idKey;
  initPocTraceBody(stageKey, `${idKey}-body`);
}

function renderPocStatusBadge(poc) {
  // "CONFIRMED" is reserved for the Final gate — the PoV gate only ever
  // reports whether a PoV attempt ran, not the overall verdict.
  if (pocNotReached(poc)) return pipelineNotReachedBadge('Not run');
  if (poc.status === 'confirmed' || poc.status === 'attempted') return '<span class="pipeline-badge kept">TRIED</span>';
  return pipelineNotReachedBadge('Not run');
}

function stage1FocusNum(s) {
  const info = s.info || {};
  if (info.focus_index != null) return info.focus_index + 1;
  const m = (s.label || '').match(/focused\s+#(\d+)/i);
  return m ? Number(m[1]) + 1 : null;
}

function stage1PassLabel(s) {
  const info = s.info || {};
  const generated = info.generated || [];
  const n = generated.length || info.hypothesis_count || 0;
  const unit = n === 1 ? 'hypothesis' : 'hypotheses';
  if (s.stage === 'stage1.wholefile') return `Summarize + synthesize (whole file) · ${n} ${unit}`;
  if (s.stage === 'stage1.focused') {
    const num = stage1FocusNum(s);
    return num != null
      ? `Summarize + synthesize (focused #${num}) · ${n} ${unit}`
      : `Summarize + synthesize (focused region) · ${n} ${unit}`;
  }
  if (s.stage === 'stage1.function') return `Extract function + synthesize (\`${info.function || '?'}\`) · ${n} ${unit}`;
  return `${cleanStageLabel(s.label || '—')} · ${n} ${unit}`;
}

function stage1TotalGenerated(stages) {
  return (stages || []).reduce((n, s) => n + ((s.info || {}).generated || []).length || (s.info || {}).hypothesis_count || 0, 0);
}

function renderStage1GenerationSummary(stages, idPrefix) {
  return (stages || []).map((s, si) => {
    const generated = (s.info || {}).generated || [];
    const idKey = `${idPrefix}-${si}`;
    const stageKey = s.stage_key || idKey;
    let html = '<details class="hyp-s1-pass">';
    html += `<summary><span class="chevron chevron-right"></span>${esc(stage1PassLabel(s))}</summary>`;
    if (generated.length) {
      html += '<ul class="hyp-s1-outcomes">';
      generated.forEach(g => { html += `<li>${esc(g)}</li>`; });
      html += '</ul>';
    } else {
      html += '<div style="font-size:.74rem;color:var(--text-dim);margin:.2rem 0 .35rem">No hypothesis summaries recorded.</div>';
    }
    html += `<a href="#" class="hyp-s1-trace-link" id="${idKey}-link" onclick="toggleStage1FullTrace('${jsStr(stageKey)}','${idKey}-body','${idKey}-link');return false">Full agent trace →</a>`;
    html += `<div class="stage-collapse-body hyp-s1-trace-body" id="${idKey}-body" data-stage-key="${esc(stageKey)}" style="display:none"></div>`;
    return html + '</details>';
  }).join('');
}

async function toggleStage1FullTrace(stageKey, bodyId, linkId) {
  const body = document.getElementById(bodyId);
  const link = document.getElementById(linkId);
  if (!body) return;
  const open = body.style.display === 'none' || !body.classList.contains('open');
  if (!open) {
    body.style.display = 'none';
    body.classList.remove('open');
    if (link) link.textContent = 'Full agent trace →';
    return;
  }
  body.style.display = 'block';
  body.classList.add('open');
  if (link) link.textContent = 'Hide agent trace ↑';
  if (!revelioStageCache[stageKey]) {
    body.innerHTML = '<div class="loading"><div class="spinner"></div><br>Loading trajectory...</div>';
    try {
      const data = await api(`/api/runs/${encodeURIComponent(currentRunId)}/stage/${encodeURIComponent(stageKey)}`);
      revelioStageCache[stageKey] = data.messages || [];
      revelioStepState[stageKey] = 0;
    } catch (e) {
      body.innerHTML = `<div class="empty"><p>Failed to load: ${esc(e.message)}</p></div>`;
      return;
    }
  }
  renderRevelioStageBody(stageKey, bodyId);
}

function renderHypothesisDetail(row) {
  const c = findClassification(row.file, row.index) || {};
  const s3 = findStage3TraceForRow(row);
  const s1Stages = findStage1ForFile(row.file);
  const keySlug = hypothesisKey(row).replace(/[^a-zA-Z0-9_-]/g, '_');
  let html = '<div class="hyp-detail-header">';
  html += '<div style="display:flex;gap:.4rem;flex-wrap:wrap;align-items:center;margin-bottom:.35rem">';
  html += `<span style="font-size:.74rem;color:var(--text-dim)">#${row.index != null ? row.index + 1 : '—'}</span>`;
  if (pipelineHid(row)) html += `<span class="badge badge-cyan">${esc(pipelineHid(row))}</span>`;
  html += pipelineFinalBadge(row);
  html += '</div>';
  html += `<div class="hyp-detail-summary">${esc(row.summary || '—')}</div>`;
  if (row.file) html += `<div class="hyp-detail-file">${esc(row.file)}</div>`;
  if (s1Stages.length) {
    const total = stage1TotalGenerated(s1Stages);
    html += `<details class="hyp-s1-link"><summary><span class="chevron chevron-right"></span>Initial proposal (${total} hypotheses)</summary>`;
    html += `<div class="hyp-s1-traces">${renderStage1GenerationSummary(s1Stages, `hyp-s1-${keySlug}`)}</div>`;
    html += '</details>';
  }
  html += '</div>';

  // Gate accordion: one stepper, click a gate to see its reasoning/trace
  // below — replaces four always-open sections that repeated the same
  // badges/text at different levels of detail.
  const gates = hypGateDefs(row);
  const defaultGate = pickDefaultHypGate(gates, row);
  currentHypGateCtx = { row, c, s3, keySlug };
  html += '<div class="hyp-funnel-card">';
  html += renderHypothesisStepper(row, defaultGate);
  html += '<div class="hyp-funnel-divider"></div>';
  html += `<div class="hyp-gate-panel" id="hyp-gate-panel">${renderHypGatePanelContent(currentHypGateCtx, defaultGate)}</div>`;
  html += '</div>';

  // Static-filter trace: always shown, independent of which gate is
  // selected above — it's the one part of this view that shouldn't
  // disappear when you click around the accordion.
  if (s3) {
    html += '<div class="section-title hyp-section-title" style="margin-bottom:.35rem">Hypothesis Builder Trace</div>';
    html += renderRevelioCollapsibleStageList([s3], `hyp-s3-${keySlug}`, revelioPocStages, { rowHid: pipelineHid(row), alwaysOpen: true, hideSummary: true });
  }

  return html;
}

function getPocBuilderStages() {
  return (revelioPocStages || []).filter(s => (s.agent || '').includes('PoCBuilder'));
}

function findPocStage(stageKey) {
  return getPocBuilderStages().find(s => s.stage_key === stageKey) || null;
}

function findPocStageByHid(hid) {
  return getPocBuilderStages().find(s => s.hid === hid) || null;
}

function isPocConfirmed(stage) {
  if (!stage) return false;
  const v = stage.validation || {};
  const r = stage.report || {};
  if (v.crash_detected || r.crash_detected) return true;
  const row = (revelioPipeline || []).find(x => pipelineHid(x) === stage.hid);
  return !!(row && row.final && row.final.confirmed);
}

function pocStageSummary(stage) {
  const h = stage.hypothesis || {};
  const row = (revelioPipeline || []).find(r => pipelineHid(r) === stage.hid);
  return row?.summary || h.title || h.description || cleanStageLabel(stage.label || stage.agent || '') || '—';
}

function pocStageMatchesSearch(stage, query) {
  if (!query) return true;
  const h = stage.hypothesis || {};
  const hay = [
    stage.hid, stage.label, stage.agent, h.title, h.description, h.file_path, h.function,
    pocStageSummary(stage),
  ].join(' ').toLowerCase();
  return hay.includes(query.toLowerCase());
}

function defaultPocListFilter(stages) {
  if ((stages || []).some(isPocConfirmed)) return { mode: 'confirmed' };
  return { mode: 'all' };
}

function getFilteredPocStages() {
  let stages = getPocBuilderStages();
  if (pocListFilter.mode === 'failed') stages = stages.filter(s => !isPocConfirmed(s));
  else if (pocListFilter.mode === 'confirmed') stages = stages.filter(isPocConfirmed);
  if (revelioSearchQuery) stages = stages.filter(s => pocStageMatchesSearch(s, revelioSearchQuery));
  return stages;
}

function renderPocOutcomeBadge(stage) {
  if (isPocConfirmed(stage)) return '<span class="pipeline-badge survived">CONFIRMED</span>';
  return '<span class="pipeline-badge dropped">FAILED</span>';
}

function renderPocTabShell(stages) {
  stages = stages || [];
  const failed = stages.filter(s => !isPocConfirmed(s)).length;
  const confirmed = stages.filter(isPocConfirmed).length;
  let html = `<div class="hyp-master-detail${pocSidebarCollapsed ? ' sidebar-collapsed' : ''}" id="revelio-poc-tab">`;
  html += `<button type="button" class="hyp-sidebar-toggle" title="${pocSidebarCollapsed ? 'Expand' : 'Collapse'} sidebar" onclick="toggleSidebarCollapse('revelio-poc-tab','poc')">${pocSidebarCollapsed ? '›' : '‹'}</button>`;
  html += '<aside class="hyp-list-pane" id="revelio-poc-list">';
  html += '<div class="hyp-list-toolbar">';
  html += '<div class="pipeline-filter-btns" id="poc-list-filters">';
  html += `<button type="button" class="${pocListFilter.mode === 'all' ? 'active' : ''}" onclick="revelioPocFilter('all',this)">All (${stages.length})</button>`;
  html += `<button type="button" class="${pocListFilter.mode === 'failed' ? 'active' : ''}" onclick="revelioPocFilter('failed',this)">Failed (${failed})</button>`;
  html += `<button type="button" class="${pocListFilter.mode === 'confirmed' ? 'active' : ''}" onclick="revelioPocFilter('confirmed',this)">Confirmed (${confirmed})</button>`;
  html += '</div></div>';
  html += '<div class="hyp-list-scroll" id="poc-list-items"></div>';

function getFilteredPipelineRows(tableId) {
  const state = pipelinePageState[tableId] || { page: 0, mode: 'all' };

  if (state.mode === 'dropped') rows = rows.filter(r => r.dropped_at);
  else if (state.mode === 'survived') rows = rows.filter(r => r.final && r.final.survived);
  return rows;
}

function renderPipelineTableRow(row, compact) {
  const dropped = !!row.dropped_at;
  const survived = row.final && row.final.survived;
  const rowCls = [dropped ? 'pipeline-dropped' : '', survived ? 'pipeline-survived' : ''].filter(Boolean).join(' ');
  const reason = pipelineDropReason(row);
  let html = `<tr class="${rowCls}" data-dropped="${dropped ? '1' : '0'}" data-survived="${survived ? '1' : '0'}">`;
  html += `<td>${row.index != null ? row.index + 1 : '—'}${row.hid ? `<br><span style="font-size:.65rem;color:var(--text-dim)">${esc(row.hid)}</span>` : ''}</td>`;
  html += `<td class="summary-cell">${esc(row.summary || '')}`;
  if (reason) html += `<div class="pipeline-reason">${esc(reason)}</div>`;
  html += '</td>';
  html += `<td>${pipelineStatusBadge(row.classify)}</td>`;
  html += `<td>${pipelineStatusBadge(row.dedup)}</td>`;
  html += `<td>${pipelineStatusBadge(row.filter)}</td>`;
  html += `<td>${pipelineFinalBadge(row)}</td>`;
  return html + '</tr>';
}

function renderListPagerHtml(state, count, pageSize, prevClick, nextClick, label, totalPagesOverride) {
  const totalPages = totalPagesOverride ?? Math.max(1, Math.ceil(count / pageSize));
  const nav = totalPages > 1;
  const info = count
    ? (nav ? `Page ${state.page + 1} of ${totalPages} · ${count} ${label}` : `${count} ${label}`)
    : `No ${label}`;
  return `<button type="button" ${!nav || state.page <= 0 ? 'disabled' : ''} onclick="${prevClick}">← Prev</button>`
    + `<span class="pipeline-pager-info">${esc(info)}</span>`
    + `<button type="button" ${!nav || state.page >= totalPages - 1 ? 'disabled' : ''} onclick="${nextClick}">Next →</button>`;
}

function renderPipelinePagerHtml(tableId, state, filtered, pageSize, totalPagesOverride) {
  return renderListPagerHtml(
    state, filtered.length, pageSize,
    `revelioPipelinePage('${jsStr(tableId)}',-1)`,
    `revelioPipelinePage('${jsStr(tableId)}',1)`,
    `hypothesis${filtered.length === 1 ? '' : 'es'}`,
    totalPagesOverride,
  );
}

function pipelineCacheKey(mode, filtered, search) {
  return `${mode}:${search || ''}:${filtered.map(r => r.index).join(',')}`;
}

function packContentPages(items, contentEl, wrapEl, renderFn, maxPerPage) {
  if (!contentEl || !wrapEl || !items.length) return [];
  const pages = [];
  let i = 0;
  while (i < items.length) {
    let pageItems = [items[i]];
    const limit = Math.min(maxPerPage, items.length - i);
    for (let n = 2; n <= limit; n++) {
      const candidate = items.slice(i, i + n);
      contentEl.innerHTML = candidate.map(renderFn).join('');
      if (wrapEl.scrollHeight <= wrapEl.clientHeight) pageItems = candidate;
      else break;
    }
    pages.push(pageItems);
    i += pageItems.length;
  }
  return pages;
}

function packPipelineTablePages(filtered, wrap, compact, maxPerPage) {
  const tbody = wrap.querySelector('tbody');
  if (!tbody) return [];
  return packContentPages(filtered, tbody, wrap, r => renderPipelineTableRow(r, compact), maxPerPage);
}

function updateRevelioPipelineTableBody(tableId) {
  const table = document.getElementById(tableId);
  const tbody = document.getElementById(`${tableId}-tbody`);
  const pager = document.getElementById(`${tableId}-pager`);
  if (!table || !tbody) return;
  const pageSize = PIPELINE_PAGE_SIZES[tableId] || 8;
  const state = pipelinePageState[tableId] || { page: 0, mode: 'all' };
  const filtered = getFilteredPipelineRows(tableId);
  const compact = table.classList.contains('compact');
  const cacheKey = pipelineCacheKey(state.mode, filtered, '');
  const wrap = table.closest('.pipeline-table-wrap');
  if (!state.packedPages || state.packedKey !== cacheKey || state.packedHeight !== (wrap ? wrap.clientHeight : 0)) {
    state.packedPages = wrap ? packPipelineTablePages(filtered, wrap, compact, pageSize) : [];
    state.packedKey = cacheKey;
    state.packedHeight = wrap ? wrap.clientHeight : 0;
  }
  const totalPages = Math.max(1, state.packedPages.length);
  if (state.page >= totalPages) state.page = totalPages - 1;
  if (state.page < 0) state.page = 0;
  pipelinePageState[tableId] = state;
  const pageRows = state.packedPages[state.page] || [];
  tbody.innerHTML = pageRows.length
    ? pageRows.map(r => renderPipelineTableRow(r, compact)).join('')
    : '<tr class="pipeline-empty"><td colspan="6" style="color:var(--text-dim);font-size:.78rem;padding:1rem 0;text-align:center">No matching hypotheses</td></tr>';
  if (pager) pager.innerHTML = renderPipelinePagerHtml(tableId, state, filtered, pageSize, totalPages);
}

function revelioPipelinePage(tableId, delta) {
  const state = pipelinePageState[tableId] || { page: 0, mode: 'all' };
  state.page = Math.max(0, state.page + delta);
  pipelinePageState[tableId] = state;
  updateRevelioPipelineTableBody(tableId);
}

function renderRevelioPipelineTable(pipeline, opts) {

  html += '<th>#</th><th>Summary</th><th title="Sanitizer-aware triage">Triage</th><th title="Deduplicate root causes">Dedup</th><th title="Independent static filtering">Static filter</th><th>Final</th>';

function revelioPipelineFilter(tableId, mode, btn) {

function getConfirmedPocItems(d) {
  const pipeline = d.revelio_hypothesis_pipeline || [];
  const pStages = d.revelio_poc_stages || [];
  const byHid = new Map();
  for (const row of pipeline) {
    const ghid = pipelineHid(row);
    if (row.final && row.final.confirmed && ghid) {
      byHid.set(ghid, { hid: ghid, row, stage: pStages.find(s => s.hid === ghid) || null, duplicateOf: row.final.duplicate_of || null });
    }
  }
  for (const ps of pStages) {
    // ps.validation/ps.report are the raw handoff wrapper ({"stage",...,"data":{...}}) — unwrap.
    const v = (ps.validation || {}).data || {};
    const r = (ps.report || {}).data || {};
    if (!(v.crash_detected || r.crash_detected)) continue;
    const hid = ps.hid;
    if (!hid) continue;
    const matchedRow = pipeline.find(x => pipelineHid(x) === hid) || null;
    const existing = byHid.get(hid) || { hid, row: matchedRow, stage: null, duplicateOf: matchedRow?.final?.duplicate_of || null };
    existing.stage = ps;
    if (!existing.row) existing.row = matchedRow;
    byHid.set(hid, existing);
  }
  return [...byHid.values()];
}

function renderConfirmedPocCard(item) {

  const h = stage?.hypothesis;
  const clickable = !!(hid && findPocStageByHid(hid));
  const cls = `confirmed-poc-card stage2-card asan${clickable ? ' clickable' : ''}`;
  const onclick = clickable ? ` onclick="revelioGoToPoc('${jsStr(hid)}')"` : '';
  let html = `<div class="${cls}"${onclick}>`;
  html += `<div style="display:flex;gap:.4rem;flex-wrap:wrap;align-items:center;margin-bottom:.3rem">`;
  html += `<span class="badge badge-green">CONFIRMED</span>`;
  if (duplicateOf) html += `<span class="badge badge-dup" title="Same crash signature as an earlier-confirmed finding">Duplicate of ${esc(duplicateOf)}</span>`;
  if (row?.final?.crash_confidence === 'generic') html += `<span class="badge badge-warn" title="No sanitizer banner or stack trace — crash location is unverified">⚠ Unattributed crash</span>`;
  if (hid) html += `<span class="badge badge-cyan">${esc(hid)}</span>`;
  html += `</div>`;
  html += `<div style="font-size:.82rem;margin-bottom:.25rem">${esc(summary)}</div>`;
  if (h) {
    const bits = [];
    if (h.file_path) bits.push(`<code>${esc(h.file_path)}</code>`);

    if (bits.length) html += `<div style="font-size:.76rem;color:var(--text-dim)">${bits.join(' · ')}</div>`;
    if (h.expected_crash) html += `<div class="expected-crash-note">${esc(h.expected_crash)}</div>`;
  }
  html += '</div>';
  return html;
}

function renderRevelioConfirmedPocs(d) {
  revelioConfirmedItems = getConfirmedPocItems(d);
  let html = `<div class="confirmed-poc-panel" id="confirmed-poc-panel">`;
  html += `<div class="section-title">PoVs confirmed</div>`;

    html += '<div class="callout callout-warn" style="margin-top:0">No confirmed PoVs yet.</div></div>';
    return html;
  }
  html += `<div class="confirmed-poc-wrap" id="confirmed-poc-wrap"><div id="confirmed-poc-body"></div></div>`;
  html += `<div class="pipeline-pager" id="confirmed-poc-pager"></div></div>`;
  return html;
}

function updateConfirmedPocPanel() {
  const body = document.getElementById('confirmed-poc-body');
  const wrap = document.getElementById('confirmed-poc-wrap');
  const pager = document.getElementById('confirmed-poc-pager');
  if (!body || !wrap || !revelioConfirmedItems.length) return;
  // Always measure against the full fixed height first, so packing sees the
  // real available space rather than a previous single-page auto-shrink.
  wrap.style.height = '';
  const cacheKey = revelioConfirmedItems.map(i => i.hid).join(',');
  if (!confirmedPocPageState.packedPages || confirmedPocPageState.packedKey !== cacheKey || confirmedPocPageState.packedHeight !== wrap.clientHeight) {
    confirmedPocPageState.packedPages = packContentPages(
      revelioConfirmedItems, body, wrap, renderConfirmedPocCard, CONFIRMED_POC_MAX,
    );
    confirmedPocPageState.packedKey = cacheKey;
    confirmedPocPageState.packedHeight = wrap.clientHeight;
  }
  const totalPages = Math.max(1, confirmedPocPageState.packedPages.length);
  if (confirmedPocPageState.page >= totalPages) confirmedPocPageState.page = totalPages - 1;
  if (confirmedPocPageState.page < 0) confirmedPocPageState.page = 0;
  const pageItems = confirmedPocPageState.packedPages[confirmedPocPageState.page] || [];
  body.innerHTML = pageItems.map(renderConfirmedPocCard).join('');
  if (totalPages <= 1) {
    // Only one page of cards — shrink the viewer to fit them instead of
    // leaving empty space up to the fixed height.
    wrap.style.height = 'auto';
  } else {
    // Multiple pages — use a fixed height equal to the tallest page's
    // content (not a blanket constant), so shorter pages don't leave dead
    // space below while taller ones still fit without clipping.
    let maxHeight = 0;
    for (const items of confirmedPocPageState.packedPages) {
      body.innerHTML = items.map(renderConfirmedPocCard).join('');
      maxHeight = Math.max(maxHeight, body.scrollHeight);
    }
    body.innerHTML = pageItems.map(renderConfirmedPocCard).join(''); // restore current page
    // wrap is border-box with its own vertical padding around body — setting
    // wrap's height to body's content height alone shrinks body's available
    // space by that padding, clipping the last ~1 line of the bottom card via
    // overflow:hidden. Add the padding back so body gets its full scrollHeight.
    const wrapCs = getComputedStyle(wrap);
    const wrapVPadding = parseFloat(wrapCs.paddingTop) + parseFloat(wrapCs.paddingBottom);
    wrap.style.height = `${maxHeight + wrapVPadding}px`;
  }
  if (pager) {
    pager.innerHTML = renderListPagerHtml(
      confirmedPocPageState, revelioConfirmedItems.length, CONFIRMED_POC_MAX,
      'confirmedPocPage(-1)', 'confirmedPocPage(1)', 'confirmed',
      totalPages,
    );
  }
}

function confirmedPocPage(delta) {
  confirmedPocPageState.page = Math.max(0, confirmedPocPageState.page + delta);
  updateConfirmedPocPanel();
}

function initConfirmedPocPanel() {

function toggleStaticCollapse(bodyId, headerId) {
  const body = document.getElementById(bodyId);
  const header = document.getElementById(headerId);
  if (!body || !header) return;
  body.classList.toggle('open');
  header.classList.toggle('expanded');
}

async function toggleRevelioStage(stageKey, bodyId, headerId) {
  const body = document.getElementById(bodyId);
  const header = document.getElementById(headerId);
  if (!body || !header) return;
  const open = body.classList.toggle('open');
  header.classList.toggle('expanded', open);
  if (!open) return;
  if (!revelioStageCache[stageKey]) {
    body.innerHTML = '<div class="loading"><div class="spinner"></div><br>Loading trajectory...</div>';
    try {
      const data = await api(`/api/runs/${encodeURIComponent(currentRunId)}/stage/${encodeURIComponent(stageKey)}`);
      revelioStageCache[stageKey] = data.messages || [];
      revelioStepState[stageKey] = 0;
    } catch (e) {
      body.innerHTML = `<div class="empty"><p>Failed to load: ${esc(e.message)}</p></div>`;
      return;
    }
  }
  renderRevelioStageBody(stageKey, bodyId);
}

function revelioStepNav(stageKey, bodyId, delta) {
  const msgs = revelioStageCache[stageKey] || [];
  const steps = messagesToSteps(msgs);
  if (!steps.length) return;
  revelioStepState[stageKey] = Math.max(0, Math.min((revelioStepState[stageKey] || 0) + delta, steps.length - 1));
  renderRevelioStageBody(stageKey, bodyId);
}

function revelioStepJump(stageKey, bodyId, index) {
  const msgs = revelioStageCache[stageKey] || [];
  const steps = messagesToSteps(msgs);
  if (!steps.length) return;
  revelioStepState[stageKey] = Math.max(0, Math.min(index, steps.length - 1));
  renderRevelioStageBody(stageKey, bodyId);
}

function toggleTrajMsg(el) {
  el.classList.toggle('expanded');
}

function renderRevelioStageBody(stageKey, bodyId) {
  const body = document.getElementById(bodyId);
  const msgs = revelioStageCache[stageKey] || [];
  const steps = messagesToSteps(msgs);
  const stepIdx = revelioStepState[stageKey] || 0;
  const query = revelioSearchQuery;
  let html = '';
  if (steps.length > 1) {
    html += `<div class="step-view"><div class="step-nav">`;
    html += `<button ${stepIdx <= 0 ? 'disabled' : ''} onclick="revelioStepNav('${jsStr(stageKey)}','${jsStr(bodyId)}',-1)">← Prev</button>`;
    const stepDigits = String(steps.length).length;
    html += `<span>Step <strong style="display:inline-block;min-width:${stepDigits}ch;text-align:right">${stepIdx + 1}</strong> / ${steps.length}</span>`;
    html += `<button ${stepIdx >= steps.length - 1 ? 'disabled' : ''} onclick="revelioStepNav('${jsStr(stageKey)}','${jsStr(bodyId)}',1)">Next →</button>`;
    // A long trace (20-200+ steps) is tedious to click through one at a
    // time to reach the end, where the interesting result (finish/crash
    // confirmation) usually is — a direct jump beats N clicks of Next.
    html += `<button ${stepIdx >= steps.length - 1 ? 'disabled' : ''} onclick="revelioStepJump('${jsStr(stageKey)}','${jsStr(bodyId)}',${steps.length - 1})">Jump to last →|</button>`;
    if (steps.length <= 60) {
      html += '<div class="step-progress">';
      steps.forEach((_, i) => {
        html += `<button type="button" class="dot${i === stepIdx ? ' current' : ''}" title="Step ${i + 1}" onclick="revelioStepJump('${jsStr(stageKey)}','${jsStr(bodyId)}',${i})"></button>`;
      });
      html += '</div>';
    }
    html += `<span style="color:var(--text-dim);font-size:.72rem;margin-left:auto">j ← · k →</span>`;
    html += '</div>';
    html += `<div class="step-content">${renderRevelioStepMessages(steps[stepIdx] || msgs, `${bodyId}-step`, query)}</div></div>`;
  } else {
    html += renderRevelioStepMessages(steps[stepIdx] || msgs, `${bodyId}-step`, query);
  }
  body.innerHTML = html;
  body.dataset.stageKey = stageKey;
  body.dataset.bodyId = bodyId;
}

function renderRevelioStepMessages(messages, idPrefix, query) {
  const toolMsgCount = messages.filter(m => m.command != null).length;
  let html = '<div class="traj-step-msgs">';
  for (let i = 0; i < messages.length; i++) {
    const msg = messages[i];
    const role = msg.role || 'unknown';
    const hasCmd = msg.command != null;
    // Both the system prompt and any long tool output are collapsed by
    // default behind a click on their role header — no separate "Show
    // more" link, no inner scrollbar, just click to reveal the full thing.
    // Short output that would never have needed scrolling anyway is left
    // fully visible with no collapse affordance at all.
    const longOutput = hasCmd && (msg.command_output || '').length > 800;
    // Every tool section gets the collapse/expand toggle, not just long ones —
    // but the default visibility below is unchanged from before this was added.
    const isCollapsible = role === 'system' || hasCmd;
    // A lone tool section has nothing else competing for space, so open it by default.
    // Short output was always shown in full before collapsibility existed, so it
    // still defaults open; only long output (with siblings) defaults collapsed.
    const autoExpand = hasCmd && (!longOutput || toolMsgCount === 1);
    html += `<div class="traj-msg ${role}${isCollapsible ? ' collapsible' : ''}${autoExpand ? ' expanded' : ''}">`;
    html += `<div class="role"${isCollapsible ? ' onclick="toggleTrajMsg(this.closest(\'.traj-msg\'))"' : ''}>${role}</div>`;
    html += '<div class="msg-body">';
    if (hasCmd) {
      const rc = msg.command_returncode;
      const rcCls = rc === 0 ? 'rc-ok' : 'rc-fail';
      html += `<div class="cmd-block"><div class="cmd-header"><span>Command</span><span class="cmd-rc ${rcCls}">exit ${rc != null ? rc : '?'}</span></div>`;
      html += `<div class="cmd-cmd">${highlightSearchText(msg.command, query)}</div>`;
      if (msg.command_output) html += `<div class="cmd-output">${highlightShell(msg.command_output)}</div>`;
      html += '</div>';
    } else if ((msg.content || '').trim()) {
      html += formatAssistantContent(msg.content, query);
    }
    html += '</div></div>';
  }
  html += '</div>';
  return html;
}

function viewPocButton(hid, extraClass) {
  if (!hid || !findPocStageByHid(hid)) return '';
  const cls = ['view-poc-btn', extraClass || ''].filter(Boolean).join(' ');
  return `<a href="#" class="${cls}" onclick="revelioGoToPoc('${jsStr(hid)}');return false">View PoV →</a>`;
}

function revelioPocLink(hid, pStages) {
  return viewPocButton(hid);
}

function renderRevelioDetail(d, m) {
  revelioStageCache = {};
  revelioStepState = {};
  revelioSearchQuery = '';
  pipelinePageState = {};
  revelioPipeline = d.revelio_hypothesis_pipeline || [];
  revelioPocStages = d.revelio_poc_stages || [];
  revelioStage2Classify = d.revelio_stage2_classify || [];
  revelioHypothesisStages = d.revelio_hypothesis_stages || [];
  selectedHypothesisKey = null;
  hypothesisListFilter = defaultHypothesisListFilter(revelioPipeline);
  selectedPocKey = null;
  pocListFilter = defaultPocListFilter(getPocBuilderStages());

  const pocBuilders = getPocBuilderStages();

  const tabs = ['Overview', 'Hypothesis', 'PoV', 'Log'];
  let html = `<div class="tabs" id="detail-tabs">`;

    html += `<div class="tab ${i === 0 ? 'active' : ''}" onclick="switchTab(${i},'detail')">${esc(t)}</div>`;
  });
  html += '</div>';

  html += `<div class="tab-panel active" id="detail-tab-0">${renderRevelioOverview(d, m)}</div>`;

  html += `<div class="tab-panel hypothesis-tab-panel" id="detail-tab-1">`;
  html += `<div class="filter-bar"><input type="text" id="revelio-hyp-search" placeholder="Search hypotheses..." oninput="revelioApplySearch('hyp')"></div>`;
  if (pipeline.length) {
    html += renderHypothesisTabShell(pipeline);
  } else {
    html += '<div class="empty"><p>No hypotheses found for this run.</p></div>';
  }
  html += '</div>';

  html += `<div class="tab-panel poc-tab-panel" id="detail-tab-2">`;
  html += `<div class="filter-bar"><input type="text" id="revelio-poc-search" placeholder="Search PoVs..." oninput="revelioApplySearch('poc')"></div>`;
  if (pocBuilders.length) {
    html += renderPocTabShell(pocBuilders);
  } else {
    const sm = d.revelio_summary || {};
    let msg = 'No PoV-stage trajectories found (trajectory.json agents).';
    if (sm.poc_status === 'skipped_no_hypotheses') msg = 'PoV stage did not run — no hypotheses survived filtering.';
    else if (sm.poc_status === 'skipped_or_incomplete') msg = 'PoV stage did not run or did not finish.';
    html += `<div class="empty"><p>${esc(msg)}</p></div>`;
  }

  html += `<div class="tab-panel log-tab-panel" id="detail-tab-3">${renderLogTab(d.log)}</div>`;

  if (pocBuilders.length) refreshPocTab();
  positionSidebarToggle('revelio-hyp-tab', true);
  positionSidebarToggle('revelio-poc-tab', true);
  initConfirmedPocPanel();
  applyLogSearch();
