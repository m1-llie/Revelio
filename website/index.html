}

function revelioKeyHandler(e) {
  if (!runDetail || !runDetail.revelio) return;
  // Multiple stage-collapse-bodies can be "open" at once (e.g. the always-open
  // hypothesis trace card stays .open even while its tab is hidden) — only the
  // one actually visible on screen should receive the shortcut.
  const open = Array.from(document.querySelectorAll('.stage-collapse-body.open')).find(el => el.offsetParent !== null);
  if (!open) return;
  const stageKey = open.dataset.stageKey;
  const bodyId = open.dataset.bodyId;
  if (!stageKey || !bodyId) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'j' || e.key === 'ArrowLeft') { e.preventDefault(); revelioStepNav(stageKey, bodyId, -1); }
  if (e.key === 'k' || e.key === 'ArrowRight') { e.preventDefault(); revelioStepNav(stageKey, bodyId, 1); }
}

function revelioApplySearch(tab) {
  const inputId = tab === 'poc' ? 'revelio-poc-search' : 'revelio-hyp-search';
  const input = document.getElementById(inputId);
  const cursor = input ? input.selectionStart : null;
  revelioSearchQuery = (input || {}).value || '';
  if (tab === 'poc') refreshPocTab();
  if (tab === 'hyp') refreshHypothesisTab();
  if (input && document.activeElement === input && cursor != null) {
    input.focus();
    input.setSelectionRange(cursor, cursor);
  }
  clearTimeout(revelioSearchDebounce);
  revelioSearchDebounce = setTimeout(() => {
    const active = document.activeElement;
    const isHypSearch = active && active.id === 'revelio-hyp-search';
    const isPocSearch = active && active.id === 'revelio-poc-search';
    const cursor = (isHypSearch || isPocSearch) ? active.selectionStart : null;
    Object.keys(revelioStageCache).forEach(key => {
      const body = document.querySelector(`.stage-collapse-body.open[data-stage-key="${key}"]`);
      if (body) renderRevelioStageBody(key, body.id);
    });
    if (isHypSearch || isPocSearch) {
      active.focus();
      if (cursor != null) active.setSelectionRange(cursor, cursor);
    }
  }, 300);
}

function renderRevelioCollapsibleStageList(stages, idPrefix, pStages, opts) {
  opts = opts || {};
  let html = '';
  stages.forEach((s, si) => {
    const idKey = `${idPrefix}-${si}`;
    const stageKey = s.stage_key || idKey;
    const info = s.info || {};
    const searchText = [s.label, info.summary, info.reason, info.verdict, s.hid].join(' ');
    const anchorId = s.stage === 'stage3.filter' && s.hid ? `hyp-${s.hid}` : (opts.showArtifacts ? `poc-${stageKey}` : idKey);
    html += `<div class="card revelio-stage-card" id="${anchorId}" data-search="${esc(searchText)}" style="margin-bottom:1rem">`;
    // The always-open hypothesis-trace card sits directly under a header
    // that already shows the hid/verdict/summary, so repeating them here
    // (hid badge, verdict badge, reason text) is pure duplication.
    if (!opts.hideSummary) {
      const headerClick = opts.alwaysOpen ? '' : ` onclick="toggleRevelioStage('${jsStr(stageKey)}','${idKey}-body','${idKey}-hdr')"`;
      const headerStyle = opts.alwaysOpen ? ' style="cursor:default"' : '';
      html += `<div class="stage-collapse-header" id="${idKey}-hdr"${headerClick}${headerStyle}>`;
      if (!opts.alwaysOpen) html += `<span class="chevron chevron-right"></span>`;
      const displayHid = opts.rowHid || s.hid;
      if (displayHid) html += `<span class="badge badge-cyan">${esc(displayHid)}</span>`;
      html += `<span>${esc(cleanStageLabel(s.label || s.agent || '—'))}</span>`;
      if (info.verdict) {
        const cls = info.verdict === 'VALID' ? 'badge-green' : info.verdict === 'INVALID' ? 'badge-red' : 'badge-orange';
        html += `<span class="badge ${cls}">${esc(info.verdict)}</span>`;
      }
      html += `<span style="font-size:.74rem;color:var(--text-dim);margin-left:auto">${s.message_count || s.raw_count || 0} msgs</span>`;
      if (opts.showPocLink && opts.pocHid) html += revelioPocLink(opts.pocHid, pStages);
      html += '</div>';
      if (info.summary && !info.verdict) html += `<p style="font-size:.78rem;color:var(--text-dim);margin:.3rem 0 0 1.2rem">${esc(info.summary)}</p>`;
      if (info.reason && info.verdict) html += `<p style="font-size:.76rem;color:var(--text-dim);margin:.3rem 0 .75rem 1.2rem"><em>${esc(info.reason)}</em></p>`;
    }
    if (opts.showArtifacts && (s.hypothesis || s.poc || s.validation || s.report)) {
      html += renderRevelioPocArtifacts(s, idKey);
    }
    html += `<div class="stage-collapse-body${opts.alwaysOpen ? ' open' : ''}" id="${idKey}-body" data-stage-key="${esc(stageKey)}" data-body-id="${esc(idKey)}-body"></div>`;
    html += '</div>';
  });
  return html;
}

function renderRevelioStageList(stages, idPrefix, opts) {
  return renderRevelioCollapsibleStageList(stages, idPrefix, [], opts);
}

function renderRevelioStage(s, idKey, opts) {
  return renderRevelioCollapsibleStageList([s], idKey, [], opts);
}

function renderRevelioPocArtifacts(s, idKey, opts) {
  opts = opts || {};
  const h = s.hypothesis || null;
  const poc = s.poc || null;
  const val = s.validation || null;
  const rep = s.report || null;
  const includeTrace = !!(opts.traceBodyId && s.stage_key);

  let html = `<div style="margin:.6rem 0">`;

  if (h) {
    html += `<div style="font-size:.82rem;margin-bottom:.4rem"><strong style="color:var(--text-bright)">Hypothesis:</strong> ${esc(h.title || h.description || '')}</div>`;
    const bits = [];
    if (h.file_path) bits.push(`<code>${esc(h.file_path)}</code>`);
    if (h.function) bits.push(`fn <code>${esc(h.function)}</code>`);
    if (typeof h.confidence === 'number') bits.push(`conf ${(h.confidence * 100).toFixed(0)}%`);
    if (bits.length) html += `<div style="font-size:.76rem;color:var(--text-dim)">${bits.join(' · ')}</div>`;
    if (h.expected_crash) html += `<div class="expected-crash-note">${esc(h.expected_crash)}</div>`;
  }

  const sub = [];
  if (poc) sub.push('PoV Recipe');
  if (val) sub.push('Validation');
  if (rep) sub.push('Report');
  if (includeTrace) sub.push('PoV Builder Trace');
  if (sub.length) {
    const stId = `${idKey}-art`;
    html += `<div class="tabs" id="${stId}" style="margin-top:.6rem;margin-bottom:.6rem;gap:.5rem">`;
    sub.forEach((t, i) => {
      html += `<div class="tab ${i === 0 ? 'active' : ''}" onclick="switchTab(${i},'${stId}')">${esc(t)}</div>`;
    });
    html += `</div>`;

    let si = 0;
    if (poc) {
      const data = poc.data || poc;
      html += `<div class="tab-panel ${si === 0 ? 'active' : ''}" id="${stId}-tab-${si}">`;
      const steps = data.generation_steps || data.steps;
      if (Array.isArray(steps) && steps.length) {
        html += `<ol style="padding-left:1.3rem;margin:.4rem 0;font-size:.82rem">`;
        for (const x of steps) html += `<li style="margin:.3rem 0">${esc(typeof x === 'string' ? x : JSON.stringify(x))}</li>`;
        html += `</ol>`;
      }
      if (data.expected_signal) html += `<div style="font-size:.8rem;margin-top:.3rem"><span style="color:var(--text-dim)">Expected signal:</span> <span class="badge badge-red">${esc(data.expected_signal)}</span></div>`;
      if (data.reproduction_command) html += `<div style="font-size:.8rem;margin-top:.3rem"><span style="color:var(--text-dim)">Repro:</span> <code>${esc(data.reproduction_command)}</code></div>`;
      html += `<details style="margin-top:.6rem"><summary style="cursor:pointer;color:var(--text-dim);font-size:.76rem">Full PoV recipe JSON</summary><pre style="margin-top:.3rem">${esc(JSON.stringify(data, null, 2))}</pre></details>`;
      html += `</div>`;
      si++;
    }
    if (val) {
      const data = val.data || val;
      html += `<div class="tab-panel ${si === 0 ? 'active' : ''}" id="${stId}-tab-${si}">`;
      html += `<div style="display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.4rem;margin-bottom:.4rem">`;
      html += `<span class="badge ${data.crash_detected ? 'badge-green' : 'badge-red'}">${data.crash_detected ? 'CRASH' : 'NO CRASH'}</span>`;
      if (data.returncode != null) html += `<span class="badge badge-cyan">exit ${data.returncode}</span>`;
      for (const ind of (data.indicators || [])) html += `<span class="badge badge-orange">${esc(ind)}</span>`;
      html += `</div>`;
      if (data.reproduction_command) html += `<div style="font-size:.8rem;margin-bottom:.3rem"><span style="color:var(--text-dim)">Repro:</span> <code>${esc(data.reproduction_command)}</code></div>`;
      if (data.output_excerpt) html += `<div class="asan-output">${formatAsan(data.output_excerpt)}</div>`;
      html += `</div>`;
      si++;
    }
    if (rep) {
      const data = rep.data || rep;
      html += `<div class="tab-panel ${si === 0 ? 'active' : ''}" id="${stId}-tab-${si}">`;
      if (typeof data === 'string') {
        html += `<div class="md-render" style="margin-top:.4rem">${renderMarkdown(data)}</div>`;
      } else if (data.markdown || data.report_md) {
        html += `<div class="md-render" style="margin-top:.4rem">${renderMarkdown(data.markdown || data.report_md)}</div>`;
      } else {
        html += `<pre style="margin-top:.4rem">${esc(JSON.stringify(data, null, 2))}</pre>`;
      }
      html += `</div>`;
      si++;
    }
    if (includeTrace) {
      html += `<div class="tab-panel ${si === 0 ? 'active' : ''}" id="${stId}-tab-${si}">`;
      html += `<div class="stage-collapse-body open" id="${esc(opts.traceBodyId)}" data-stage-key="${esc(s.stage_key)}" data-body-id="${esc(opts.traceBodyId)}" style="margin-top:.4rem"></div>`;
      html += `</div>`;
      si++;
    }
  }

  html += `</div>`;
  return html;
}

function renderHypotheses(d) {
  let html = '';
  const hyps = d.artifacts.hypotheses || [];
  const validations = d.artifacts.validation || [];
  const pocs = d.artifacts.poc || [];
  const reports = d.artifacts.reports || [];

  // Build lookup by hypothesis_id
  const valMap = {};
  for (const v of validations) { if (v.data) valMap[v.data.hypothesis_id] = v.data; }
  const pocMap = {};
  for (const p of pocs) { if (p.data) pocMap[p.data.hypothesis_id] = p.data; }
  const repMap = {};
  for (const r of reports) { if (r.data) repMap[r.data.hypothesis_id] = r.data; }

  for (const hFile of hyps) {
    if (!hFile.data) continue;
    const hypotheses = hFile.data.hypotheses || [];
    html += `<div class="section-title">Vulnerability Hypotheses <span class="count">${hypotheses.length}</span></div>`;

    for (const h of hypotheses) {
      const val = valMap[h.hypothesis_id];
      const poc = pocMap[h.hypothesis_id];
      const rep = repMap[h.hypothesis_id];
      const hypOut = d.hypothesis_outputs[h.hypothesis_id] || {};
      const confirmed = val && val.crash_detected;

      html += `<div class="card hyp-card" style="border-left-color:${confirmed ? 'var(--green)' : 'var(--accent)'}">`;

      // Header
      html += `<div class="hyp-header">`;
      html += `<div>`;
      html += `<h3 style="display:flex;align-items:center;gap:.5rem">`;
      html += `<span class="badge ${confirmed ? 'badge-green' : 'badge-orange'}">${h.hypothesis_id}</span> `;
      html += esc(h.title);
      html += `</h3>`;
      html += `</div>`;
      html += `<div style="text-align:right">`;
      html += `<div style="font-size:.72rem;color:var(--text-dim)">Confidence</div>`;
      html += `<div style="font-size:1.1rem;font-weight:700;color:${h.confidence >= 0.8 ? 'var(--green)' : h.confidence >= 0.5 ? 'var(--orange)' : 'var(--red)'}">${(h.confidence * 100).toFixed(0)}%</div>`;
      html += `<div class="confidence-bar"><div class="fill" style="width:${h.confidence*100}%;background:${h.confidence >= 0.8 ? 'var(--green)' : h.confidence >= 0.5 ? 'var(--orange)' : 'var(--red)'}"></div></div>`;
      html += `</div></div>`;

      // Description
      html += `<p style="margin:.8rem 0;line-height:1.6;font-size:.85rem">${esc(h.description)}</p>`;

      // Details grid
      html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin:.8rem 0;font-size:.82rem">`;
      if (h.file_path) html += `<div><span style="color:var(--text-dim)">File:</span> <code>${esc(h.file_path)}</code></div>`;
      if (h.function) html += `<div><span style="color:var(--text-dim)">Function:</span> <code>${esc(h.function)}</code></div>`;
      if (h.trigger) html += `<div style="grid-column:1/-1"><span style="color:var(--text-dim)">Trigger:</span> ${esc(h.trigger)}</div>`;
      html += `</div>`;
      if (h.expected_crash) html += `<div><span style="color:var(--text-dim);font-size:.78rem">Expected:</span><div class="expected-crash-note">${esc(h.expected_crash)}</div></div>`;

      // Preconditions
      if (h.preconditions && h.preconditions.length) {
        html += `<div style="margin:.5rem 0"><span style="color:var(--text-dim);font-size:.78rem">Preconditions:</span><ul style="padding-left:1.2rem;margin:.3rem 0;font-size:.82rem">`;
        for (const p of h.preconditions) html += `<li>${esc(p)}</li>`;
        html += `</ul></div>`;
      }

      // References
      if (h.references && h.references.length) {
        html += `<div style="margin:.5rem 0"><span style="color:var(--text-dim);font-size:.78rem">Code References:</span>`;
        for (const ref of h.references) {
          html += `<div style="margin:.3rem 0;padding:.4rem .6rem;background:var(--rv-tint);border-radius:6px;font-size:.78rem">`;
          html += `<code class="code-ref"><span class="file">${esc(ref.file_path || '')}</span>`;
          if (ref.line_start) html += `<span class="lines">:${ref.line_start}${ref.line_end ? '-' + ref.line_end : ''}</span>`;
          html += `</code>`;
          if (ref.function) html += ` <span style="color:var(--rv-text);font-family:var(--mono)">${esc(ref.function)}</span>`;
          if (ref.context) html += `<div style="color:var(--text-dim);margin-top:.3rem;font-size:.75rem">${esc(ref.context)}</div>`;
          html += `</div>`;
        }
        html += `</div>`;
      }

      // ── Sub-sections: Validation, PoV, Report ──
      const subTabs = [];
      if (val) subTabs.push('Validation');
      if (poc) subTabs.push('PoV');
      if (hypOut.report_md) subTabs.push('Report');
      if (hypOut.script_py) subTabs.push('Script');

      if (subTabs.length) {
        const stId = 'subtab-' + h.hypothesis_id;
        html += `<div class="tabs" id="${stId}" style="margin-top:1rem;border-top:1px solid var(--border);padding-top:.5rem">`;
        subTabs.forEach((st, i) => {
          html += `<div class="tab ${i===0?'active':''}" onclick="switchTab(${i},'${stId}')">${st}</div>`;
        });
        html += `</div>`;

        let si = 0;

        // Validation panel
        if (val) {
          html += `<div class="tab-panel ${si===0?'active':''}" id="${stId}-tab-${si}">`;
          html += `<div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.8rem">`;
          html += `<span class="badge ${val.crash_detected ? 'badge-green' : 'badge-red'}">${val.crash_detected ? 'CRASH DETECTED' : 'NO CRASH'}</span>`;
          if (val.returncode != null) html += `<span class="badge badge-cyan">exit code: ${val.returncode}</span>`;
          for (const ind of (val.indicators || [])) {
            html += `<span class="badge badge-orange">${esc(ind)}</span>`;
          }
          html += `</div>`;
          if (val.reproduction_command) html += `<div style="margin-bottom:.5rem;font-size:.82rem"><span style="color:var(--text-dim)">Repro:</span> <code>${esc(val.reproduction_command)}</code></div>`;
          if (val.output_excerpt) {
            html += `<div class="asan-output">${formatAsan(val.output_excerpt)}</div>`;
          }
          html += `</div>`;
          si++;
        }

        // PoV panel
        if (poc) {
          html += `<div class="tab-panel ${si===0?'active':''}" id="${stId}-tab-${si}">`;
          if (poc.generation_steps && poc.generation_steps.length) {
            html += `<div style="margin-bottom:1rem"><strong style="font-size:.82rem;color:var(--text-bright)">Generation Steps:</strong><ol style="padding-left:1.3rem;margin:.4rem 0;font-size:.82rem">`;
            for (const s of poc.generation_steps) html += `<li style="margin:.3rem 0">${esc(s)}</li>`;
            html += `</ol></div>`;
          }
          if (poc.expected_signal) html += `<div style="margin-bottom:.5rem;font-size:.82rem"><span style="color:var(--text-dim)">Expected Signal:</span> <span class="badge badge-red">${esc(poc.expected_signal)}</span></div>`;
          if (poc.reproduction_command) html += `<div style="margin-bottom:.5rem;font-size:.82rem"><span style="color:var(--text-dim)">Repro:</span> <code>${esc(poc.reproduction_command)}</code></div>`;
          if (hypOut.poc_hex) {
            html += `<div style="margin-top:.8rem"><strong style="font-size:.82rem;color:var(--text-bright)">PoV Binary (${hypOut.poc_size} bytes):</strong>`;
            html += `<pre style="margin-top:.4rem">${formatHex(hypOut.poc_hex)}</pre>`;
            html += `</div>`;
          }
          html += `</div>`;
          si++;
        }

        // Report panel
        if (hypOut.report_md) {
          html += `<div class="tab-panel ${si===0?'active':''}" id="${stId}-tab-${si}">`;
          html += `<div class="md-render">${renderMarkdown(hypOut.report_md)}</div>`;
          html += `</div>`;
          si++;
        }

        // Script panel
        if (hypOut.script_py) {
          html += `<div class="tab-panel ${si===0?'active':''}" id="${stId}-tab-${si}">`;
          html += `<div class="script-view"><button class="copy-btn" onclick="copyText(this)">Copy</button><pre>${esc(hypOut.script_py)}</pre></div>`;
          html += `</div>`;
          si++;
        }
      }

      html += `</div>`; // close hyp-card
    }
  }

  if (!html) html = '<div class="empty"><p>No hypotheses found.</p></div>';
  return html;
}

function renderTrajectories(d) {
  let html = `<div class="section-title">Agent Trajectories <span class="count">${(d.trajectory_summaries||[]).length}</span></div>`;
  for (const t of (d.trajectory_summaries || [])) {
    html += `<div class="agent-row" onclick="loadTrajectory('${encUri(currentRunId)}','${esc(t.path)}','${esc(t.agent_name)}')">`;
    html += `<div class="name">${esc(t.agent_name)}</div>`;
    html += `<div class="detail">${t.message_count || '?'} msgs</div>`;
    html += `<div class="detail">${t.api_calls || '?'} calls</div>`;
    html += `<div class="detail">$${(t.cost || 0).toFixed(2)}</div>`;
    html += `</div>`;
  }
  html += `<div id="trajectory-viewer"></div>`;
  return html;
}

async function loadTrajectory(runId, path, agentName) {
  const viewer = document.getElementById('trajectory-viewer');
  viewer.innerHTML = '<div class="loading"><div class="spinner"></div><br>Loading trajectory...</div>';
  try {
    const traj = await api(`/api/runs/${encodeURIComponent(runId)}/artifact/${path}`);
    const messages = traj.data?.messages || [];
    const info = traj.data?.info || {};
    let html = `<div style="margin-top:1rem">`;
    html += `<div class="section-title">${esc(agentName)} <span class="badge badge-green">${esc(info.exit_status || '—')}</span></div>`;

    // Config info
    if (info.config?.environment) {
      const env = info.config.environment;
      html += `<div style="font-size:.78rem;color:var(--text-dim);margin-bottom:1rem">Image: <code>${esc(env.image||'—')}</code> | CWD: <code>${esc(env.cwd||'—')}</code> | Timeout: ${env.timeout||'—'}s</div>`;
    }

    // Messages
    html += `<div class="section-title">Messages <span class="count">${messages.length}</span></div>`;
    for (let i = 0; i < messages.length; i++) {
      const msg = messages[i];
      const role = msg.role || 'unknown';
      const content = typeof msg.content === 'string' ? msg.content : JSON.stringify(msg.content, null, 2);
      const hasCmd = msg.command != null;
      const msgId = `msg-${agentName}-${i}`;
      // Tool sections always defaulted to fully visible before collapsibility
      // existed, so autoExpand stays true — this only adds the toggle.
      html += `<div class="traj-msg ${role}${hasCmd ? ' collapsible expanded' : ''}">`;
      html += `<div class="role"${hasCmd ? ` onclick="toggleTrajMsg(this.closest('.traj-msg'))"` : ''}>${role}${msg.timestamp ? ` <span style="font-weight:400;color:var(--text-dim)">${new Date(msg.timestamp).toLocaleTimeString()}</span>` : ''}</div>`;
      html += `<div class="msg-body">`;

      if (hasCmd) {
        // Structured command + output display
        const rc = msg.command_returncode;
        const rcCls = rc === 0 ? 'rc-ok' : 'rc-fail';
        const cmdOut = msg.command_output || '';
        const cmdOutId = `cmdout-${agentName}-${i}`;
        const cmdOutLong = cmdOut.length > 800;
        html += `<div class="cmd-block">`;
        html += `<div class="cmd-header"><span>Command</span><span class="cmd-rc ${rcCls}">exit ${rc != null ? rc : '?'}</span></div>`;
        html += `<div class="cmd-cmd">${esc(msg.command)}</div>`;
        if (cmdOut) {
          html += `<div class="cmd-output ${cmdOutLong ? 'collapsed' : ''}" id="${cmdOutId}">${esc(cmdOut)}</div>`;
          if (cmdOutLong) html += `<div style="text-align:center;padding:.3rem"><span class="msg-toggle" onclick="toggleMsg('${cmdOutId}',this)">Show more</span></div>`;
        }
        html += `</div>`;
      } else {
        const isLong = content.length > 600;
        html += `<div class="content ${isLong ? 'collapsed' : ''}" id="${msgId}">${esc(content)}</div>`;
        if (isLong) html += `<span class="msg-toggle" onclick="toggleMsg('${msgId}',this)">Show more</span>`;
      }
      html += `</div>`;

      html += `</div>`;
    }

    // Submission
    if (info.submission) {
      html += `<div class="section-title" style="margin-top:1.5rem">Final Submission</div>`;
      html += `<pre>${esc(info.submission)}</pre>`;
    }

    html += `</div>`;
    viewer.innerHTML = html;
  } catch (e) {
    viewer.innerHTML = `<div class="card"><p>Failed to load trajectory: ${esc(e.message)}</p></div>`;
  }
}

function renderLogTab(logText) {
  return `<div class="log-tab-header">`
    + `<div class="filter-bar"><input type="text" id="log-search" placeholder="Search log lines..." oninput="applyLogSearch()"></div>`
    + `<div class="log-search-meta" id="log-search-meta"></div></div>`
    + renderLog(logText);
}

function applyLogSearch() {
  const input = document.getElementById('log-search');
  const viewer = document.getElementById('log-viewer');
  const meta = document.getElementById('log-search-meta');
  if (!viewer) return;
  const q = (input || {}).value || '';
  const cursor = input && document.activeElement === input ? input.selectionStart : null;
  let visible = 0;
  const lines = viewer.querySelectorAll('.log-line');
  lines.forEach(line => {
    const match = revelioMatchesSearch(line.textContent, q);
    line.classList.toggle('log-match-hidden', !match);
    if (match) visible++;
  });
  if (meta) {
    meta.textContent = q.trim()
      ? `${visible} of ${lines.length} lines match`
      : `${lines.length} lines`;
  }
  if (input && cursor != null) {
    input.focus();
    input.setSelectionRange(cursor, cursor);
  }
}

function renderLog(logText) {
  if (!logText) return '<div class="empty"><p>No log available.</p></div>';
  const lines = logText.split('\n');
  let html = '<div class="log-panel"><div class="log-viewer" id="log-viewer">';
  for (const line of lines) {
    if (!line.trim()) continue;
    let cls = 'log-line';
    if (line.includes('finished with')) cls += ' log-finish';
    else if (line.includes('Starting') || line.includes('Running')) cls += ' log-start';

    const parts = line.split(' | ', 2);
    if (parts.length === 2) {
      const ts = parts[0];
      let msg = prettifyRevelioLog(parts[1]);
      msg = msg.replace(/(RepoReviewerAgent|HypothesisGeneratorAgent|PoCBuilderAgent|ValidatorAgent|ReporterAgent)/g, '<span class="log-agent">$1</span>');
      msg = msg.replace(/(\$[\d.]+)/g, '<span style="color:var(--yellow)">$1</span>');
      html += `<span class="${cls}"><span class="log-ts">${esc(ts)}</span> | ${msg}\n</span>`;
    } else {
      html += `<span class="${cls}">${esc(prettifyRevelioLog(line))}\n</span>`;
    }
  }
  return html + '</div></div>';
}

// ── Tab switching ──────────────────────────────────────────────
function switchTab(idx, prefix) {
  const container = document.getElementById('app');
  const tabs = container.querySelectorAll(`#${prefix === 'detail' ? 'detail-tabs' : prefix} .tab`);
  tabs.forEach((t, i) => t.classList.toggle('active', i === idx));
  let i = 0;
  let shownPanel = null;
  while (true) {
    const panel = document.getElementById(`${prefix === 'detail' ? 'detail' : prefix}-tab-${i}`);
    if (!panel) break;
    const active = i === idx;
    panel.classList.toggle('active', active);
    if (panel.classList.contains('log-tab-panel')) panel.style.display = active ? 'flex' : 'none';
    else panel.style.display = active ? 'block' : 'none';
    if (active) shownPanel = panel;
    i++;
  }
  if (shownPanel) {
    repackPagedListsIn(shownPanel);
    // The scroll-into-view correction (and list-scroll resets below) only
    // make sense for the primary Overview/Hypothesis/PoV/Log tab bar — this
    // same switchTab() is reused for many small nested sub-tab groups
    // (artifact PoV Recipe/Validation/Report, stage1 pass details, etc.),
    // and scrolling the page for those is jarring/unwanted.
    if (prefix === 'detail') {
      const tabsBar = document.getElementById('detail-tabs');
      if (tabsBar) {
        // Only correct scroll when the tab bar is actually out of view (user
        // scrolled deep into a tab's content) — scrollIntoView's "start"
        // alignment snaps to an exact pixel offset even when already close,
        // which produced a small unwanted jump on every single tab click.
        const top = tabsBar.getBoundingClientRect().top;
        if (top < 0 || top > 200) tabsBar.scrollIntoView({ behavior: 'instant', block: 'start' });
      }
    }
    if (prefix === 'detail' && idx === 1) {
      document.querySelector('#revelio-hyp-tab .hyp-list-scroll')?.scrollTo(0, 0);
      document.getElementById('revelio-hyp-detail')?.scrollTo(0, 0);
    }
    if (prefix === 'detail' && idx === 2) {
      document.querySelector('#revelio-poc-tab .hyp-list-scroll')?.scrollTo(0, 0);
      document.getElementById('revelio-poc-detail')?.scrollTo(0, 0);
    }
    // Trace min-height sizing can run while the Hypothesis/PoV tab is still
    // hidden (display:none), which measures the sidebar at 0px — re-sync
    // once the tab is actually the one being shown.
    if (prefix === 'detail' && idx === 1) {
      if (currentHypGateCtx) equalizeHypGatePanelHeight(currentHypGateCtx);
      applyTraceMinHeight(currentHypTraceBodyId);
      positionSidebarToggle('revelio-hyp-tab', true);
    }
    if (prefix === 'detail' && idx === 2) {
      applyTraceMinHeight(currentPocTraceBodyId);
      positionSidebarToggle('revelio-poc-tab', true);
    }
  }
}

// Height-based pagination (packContentPages) measures clientHeight to decide
// how many rows fit per page. A tab-panel is `display:none` until shown, so
// that measurement reads 0 and wrongly assumes everything fits. Re-pack once
// the panel is actually visible so pages reflect real available height.
function repackPagedListsIn(panel) {
  // updateRevelioPipelineTableBody/updateConfirmedPocPanel only actually
  // re-pack when the cache key or measured height changed, so calling them
  // on every tab switch is cheap once a panel has been packed at its real
  // (visible) height — this just catches the hidden-tab-at-first-render case.
  panel.querySelectorAll('.pipeline-table-wrap table.pipeline-table').forEach(table => {
    if (pipelinePageState[table.id]) updateRevelioPipelineTableBody(table.id);
  });
  if (panel.querySelector('#confirmed-poc-wrap')) updateConfirmedPocPanel();
}

function toggleMsg(id, btn) {
  const el = document.getElementById(id);
  const collapsed = el.classList.toggle('collapsed');
  btn.textContent = collapsed ? 'Show more' : 'Show less';
}

function copyText(btn) {
  const pre = btn.parentElement.querySelector('pre');
  navigator.clipboard.writeText(pre.textContent).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

// ── Inline trajectory renderer (for trajectory-only runs) ──────
function renderInlineTrajectory(messages, idPrefix, opts) {
  opts = opts || {};
  if (!messages.length) return opts.silent ? '' : '<div class="empty"><p>No messages in trajectory.</p></div>';
  const prefix = idPrefix || 'inline';
  let html = '';
  if (!opts.noHeader) {
    const title = opts.title || 'Trajectory';
    html += `<div class="section-title">${esc(title)} <span class="count">${messages.length}</span></div>`;
  }

  for (let i = 0; i < messages.length; i++) {
    const msg = messages[i];
    const role = msg.role || 'unknown';
    const hasCmd = msg.command != null;
    const msgId = `${prefix}-msg-${i}`;

    // Tool sections always defaulted to fully visible before collapsibility
    // existed, so autoExpand stays true — this only adds the toggle.
    html += `<div class="traj-msg ${role}${hasCmd ? ' collapsible expanded' : ''}">`;
    html += `<div class="role"${hasCmd ? ` onclick="toggleTrajMsg(this.closest('.traj-msg'))"` : ''}>${role}${msg.timestamp ? ` <span style="font-weight:400;color:var(--text-dim)">${new Date(msg.timestamp).toLocaleTimeString()}</span>` : ''}</div>`;
    html += `<div class="msg-body">`;

    if (hasCmd) {
      const rc = msg.command_returncode;
      const rcCls = rc === 0 ? 'rc-ok' : 'rc-fail';
      const cmdOut = msg.command_output || '';
      const cmdOutId = `${prefix}-cmdout-${i}`;
      const cmdOutLong = cmdOut.length > 800;
      html += `<div class="cmd-block">`;
      html += `<div class="cmd-header"><span>Command</span><span class="cmd-rc ${rcCls}">exit ${rc != null ? rc : '?'}</span></div>`;
      html += `<div class="cmd-cmd">${esc(msg.command)}</div>`;
      if (cmdOut) {
        html += `<div class="cmd-output ${cmdOutLong ? 'collapsed' : ''}" id="${cmdOutId}">${esc(cmdOut)}</div>`;
        if (cmdOutLong) html += `<div style="text-align:center;padding:.3rem"><span class="msg-toggle" onclick="toggleMsg('${cmdOutId}',this)">Show more</span></div>`;
      }
      html += `</div>`;
    } else {
      const content = msg.content || '';
      if (!content.trim()) { html += `</div></div>`; continue; }
      const isLong = content.length > 600;
      html += `<div class="content ${isLong ? 'collapsed' : ''}" id="${msgId}">${esc(content)}</div>`;
      if (isLong) html += `<span class="msg-toggle" onclick="toggleMsg('${msgId}',this)">Show more</span>`;
    }

    html += `</div>`;
    html += `</div>`;
  }
  return html;
}

// ── Vuln Context ────────────────────────────────────────────────
let vulnContextData = null;
let vulnContextLoaded = false;

async function loadVulnContext() {
  if (vulnContextLoaded) return;
  vulnContextLoaded = true;
  const container = document.getElementById('vuln-context-container');
  if (!container) return;
  container.innerHTML = '<div class="loading"><div class="spinner"></div><br>Loading vulnerability context...</div>';
  try {
    vulnContextData = await api(`/api/runs/${encodeURIComponent(currentRunId)}/vuln_context`);
    renderVulnContext(container);
  } catch (e) {
    container.innerHTML = `<div class="empty"><p>No vulnerability context available: ${esc(e.message)}</p></div>`;
  }
}

function renderVulnContext(container) {
  const d = vulnContextData;
  if (!d) return;

  let html = '';

  // CVE info header
  if (d.cve_id) {
    html += `<div class="cve-info-box" style="margin-bottom:1rem;background:var(--bg-card);border-radius:var(--radius)">`;
    html += `<div class="cve-title">${esc(d.cve_id)}</div>`;
    if (d.cve_info.description) html += `<div class="cve-desc">${esc(d.cve_info.description)}</div>`;
    if (d.cve_info.cwe_ids && d.cve_info.cwe_ids.length) {
      html += `<div style="margin-top:.3rem">${d.cve_info.cwe_ids.map(c => `<span class="badge badge-orange">${esc(c)}</span>`).join(' ')}</div>`;
    }
    html += `</div>`;
  }

  // Reported locations summary
  if (d.reported_locations.length) {
    html += `<div class="section-title">Reported Locations <span class="count">${d.reported_locations.length}</span></div>`;
    html += `<div class="vuln-loc-list" style="margin-bottom:1rem">`;
    for (let i = 0; i < d.reported_locations.length; i++) {
      const loc = d.reported_locations[i];
      html += `<div class="vuln-loc-item" onclick="scrollToVulnLoc(${i})">`;
      html += `<div class="loc-file">${esc(loc.file_path)}</div>`;
      html += `<div class="loc-lines">Lines ${loc.line_start}${loc.line_end !== loc.line_start ? '-' + loc.line_end : ''} <span class="badge badge-purple" style="margin-left:.3rem">${esc(loc.source)}</span></div>`;
      if (loc.function) html += `<div class="loc-fn">${esc(loc.function)}</div>`;
      if (loc.context) html += `<div class="loc-ctx">${esc(loc.context)}</div>`;
      html += `</div>`;
    }
    html += `</div>`;
  }

  // Side-by-side panels
  html += `<div class="vuln-context-panels">`;

  // Left panel: Source files with highlights
  html += `<div class="vuln-panel">`;
  html += `<div class="vuln-panel-header">Source Code</div>`;

  const fileNames = Object.keys(d.source_files);
  if (fileNames.length > 0) {
    html += `<div class="source-file-selector" id="vuln-file-selector">`;
    fileNames.forEach((f, i) => {
      html += `<button class="file-btn ${i===0?'active':''}" onclick="switchVulnFile(${i})">${esc(f.split('/').pop())}</button>`;
    });
    html += `</div>`;
    fileNames.forEach((fp, fi) => {
      html += `<div class="vuln-panel-body" id="vuln-file-${fi}" style="${fi>0?'display:none':''}">`;
      html += renderSourceWithHighlights(fp, d.source_files[fp], d.reported_locations);
      html += `</div>`;
    });
  } else {
    html += `<div class="vuln-panel-body"><div class="empty" style="padding:2rem"><p>No source files available in scripts/repos/</p></div></div>`;
  }
  html += `</div>`;

  // Right panel: Patch diff
  html += `<div class="vuln-panel">`;
  html += `<div class="vuln-panel-header">Actual Patch</div>`;
  html += `<div class="vuln-panel-body">`;
  if (d.patch) {
    html += renderDiff(d.patch);
  } else {
    html += `<div class="empty" style="padding:2rem"><p>No patch file found</p></div>`;
  }
  html += `</div></div>`;

  html += `</div>`; // close panels

  container.innerHTML = html;
}

function renderSourceWithHighlights(filePath, content, locations) {
  const lines = content.split('\n');
  // Build highlight ranges for this file
  const highlights = {};
  const annotations = {};
  for (const loc of locations) {
    // Match by exact path or by filename suffix
    const locPath = loc.file_path || '';
    if (filePath === locPath || filePath.endsWith('/' + locPath) || locPath.endsWith('/' + filePath.split('/').pop())) {
      const start = loc.line_start || 0;
      const end = loc.line_end || start;
      for (let l = start; l <= end; l++) {
        highlights[l] = true;
      }
      // Annotate at the start line
      if (start && (loc.function || loc.context)) {
        annotations[start] = { fn: loc.function || '', ctx: loc.context || '' };
      }
    }
  }

  let html = '<div class="source-lines">';
  for (let i = 0; i < lines.length; i++) {
    const lineNum = i + 1;
    const isHL = highlights[lineNum];
    // Annotation before the highlighted block starts
    if (annotations[lineNum]) {
      const ann = annotations[lineNum];
      html += `<div class="hl-annotation">${ann.fn ? '<strong>' + esc(ann.fn) + '</strong> — ' : ''}${esc(ann.ctx)}</div>`;
    }
    html += `<div class="source-line ${isHL ? 'hl' : ''}" id="src-line-${lineNum}">`;
    html += `<span class="ln">${lineNum}</span>`;
    html += `<span class="code">${esc(lines[i])}</span>`;
    html += `</div>`;
  }
  html += '</div>';
  return html;
}

function renderDiff(patch) {
  const lines = patch.split('\n');
  let html = '<div class="diff-lines">';
  for (const line of lines) {
    let cls = 'diff-line';
    if (line.startsWith('+') && !line.startsWith('+++')) cls += ' diff-add';
    else if (line.startsWith('-') && !line.startsWith('---')) cls += ' diff-del';
    else if (line.startsWith('@@')) cls += ' diff-hunk';
    else if (line.startsWith('diff ') || line.startsWith('index ') || line.startsWith('---') || line.startsWith('+++')) cls += ' diff-header';
    html += `<div class="${cls}">${esc(line)}</div>`;
  }
  html += '</div>';
  return html;
}

function switchVulnFile(idx) {
  // Toggle file visibility
  let i = 0;
  while (true) {
    const el = document.getElementById('vuln-file-' + i);
    if (!el) break;
    el.style.display = i === idx ? '' : 'none';
    i++;
  }
  // Toggle button active state
  const selector = document.getElementById('vuln-file-selector');
  if (selector) {
    selector.querySelectorAll('.file-btn').forEach((btn, bi) => {
      btn.classList.toggle('active', bi === idx);
    });
  }
}

function scrollToVulnLoc(locIdx) {
  if (!vulnContextData) return;
  const loc = vulnContextData.reported_locations[locIdx];
  if (!loc) return;
  const fp = loc.file_path;
  // Find and activate the matching file tab
  const fileNames = Object.keys(vulnContextData.source_files);
  let fileIdx = -1;
  for (let i = 0; i < fileNames.length; i++) {
    if (fileNames[i] === fp || fileNames[i].endsWith('/' + fp) || fp.endsWith('/' + fileNames[i].split('/').pop())) {
      fileIdx = i;
      break;
    }
  }
  if (fileIdx >= 0) {
    switchVulnFile(fileIdx);
    // Scroll to the line
    setTimeout(() => {
      const lineEl = document.getElementById('src-line-' + loc.line_start);
      if (lineEl) lineEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 100);
  }
}

function fmtDuration(seconds) {
  if (seconds < 60) return Math.round(seconds) + 's';
  if (seconds < 3600) return Math.floor(seconds / 60) + 'm ' + Math.round(seconds % 60) + 's';
  return Math.floor(seconds / 3600) + 'h ' + Math.floor((seconds % 3600) / 60) + 'm';
}

// ── Formatting helpers ─────────────────────────────────────────
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function encUri(s) { return encodeURIComponent(s); }

function statCard(val, label, hero) {
  const cls = hero ? 'stat-card stat-hero' : 'stat-card';
  return `<div class="${cls}"><div class="lbl">${esc(label)}</div><div class="stat-card-body"><div class="val">${esc(String(val))}</div></div></div>`;
}

function statCardTarget(ref) {
  const full = ref || '—';
  const short = full.includes('/') ? full.split('/').pop() : full;
  const title = full !== short ? ` title="${esc(full)}"` : '';
  return `<div class="stat-card"${title}><div class="lbl">Target</div><div class="stat-card-body"><div class="val">${esc(short || full)}</div></div></div>`;
}

function shortModel(name) {
  if (!name) return '—';
  // Strip a trailing dated-snapshot suffix (e.g. "claude-haiku-4-5-20251001" -> "claude-haiku-4-5").
  return String(name).split('/').pop().replace(/-\d{8}$/, '');
}

function revelioModelsUsed(m) {
  const scan = m.model_name;
  const filter = m.filter_model || scan;
  const poc = m.poc_model || scan;
  const roles = [];
  if (scan) roles.push({ role: 'Scan', model: scan });
  if (filter && filter !== scan) roles.push({ role: 'Filter', model: filter });
  if (poc && poc !== scan && poc !== filter) roles.push({ role: 'PoV', model: poc });
  return roles;
}

function statCardModels(m) {
  const roles = revelioModelsUsed(m);
  if (!roles.length) return statCard('—', 'Models');
  if (roles.length === 1) return statCard(shortModel(roles[0].model), 'Model');
  const val = roles.map(({ role, model }) =>
    `<span class="model-role"><span class="model-role-lbl">${esc(role)}</span>${esc(shortModel(model))}</span>`
  ).join('');
  return `<div class="stat-card stat-card-models"><div class="lbl">Models</div><div class="stat-card-body"><div class="val">${val}</div></div></div>`;
}

function statCardStage(label, model, cost) {
  const modelLabel = model ? shortModel(model) : '—';
  const costLabel = cost != null ? '$' + cost.toFixed(4) : '—';
  return `<div class="stat-card" title="${esc(model || '')}">
    <div class="lbl">${esc(label)}</div>
    <div class="stat-card-body">
      <div class="val" style="font-size:.95rem">${esc(modelLabel)}</div>
      <div style="font-size:.78rem;color:var(--text-dim);font-variant-numeric:tabular-nums">${esc(costLabel)}</div>
    </div>
  </div>`;
}

function runModelTags(r) {
  const roles = revelioModelsUsed(r);
  if (!roles.length) return ['—'];
  if (roles.length === 1) return [shortModel(roles[0].model)];
  return roles.map(({ role, model }) => `${role}: ${shortModel(model)}`);
}

function formatAsan(text) {
  return esc(text)
    .replace(/(ERROR: AddressSanitizer: \S+)/g, '<span class="asan-error">$1</span>')
    .replace(/(SUMMARY:.*)/g, '<span class="asan-summary">$1</span>')
    .replace(/(#\d+ 0x[0-9a-f]+ in \S+)/g, '<span class="asan-frame">$1</span>');
}

function formatHex(hexStr) {
  let out = '';
  const bytes = [];
  for (let i = 0; i < hexStr.length; i += 2) {
    bytes.push(parseInt(hexStr.substr(i, 2), 16));
  }
  for (let i = 0; i < bytes.length; i += 16) {
    const chunk = bytes.slice(i, i + 16);
    const offset = i.toString(16).padStart(8, '0');
    const hex = chunk.map(b => b.toString(16).padStart(2, '0')).join(' ');
    const ascii = chunk.map(b => (b >= 32 && b < 127) ? String.fromCharCode(b) : '.').join('');
    out += `${offset}  ${hex.padEnd(48)}  |${ascii}|\n`;
  }
  return esc(out);
}

function renderMarkdown(md) {
  // Minimal markdown renderer
  let html = esc(md);

  // Code blocks (indented with 4 spaces)
  html = html.replace(/^(    .+(\n    .+)*)/gm, (m) => {
    return '<pre><code>' + m.replace(/^    /gm, '') + '</code></pre>';
  });

  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // List items
  html = html.replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>');
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');

  // Paragraphs (double newlines)
  html = html.replace(/\n\n/g, '</p><p>');
  html = '<p>' + html + '</p>';

  // Clean up empty paragraphs
  html = html.replace(/<p>\s*<\/p>/g, '');
  html = html.replace(/<p>\s*(<h[1-3]>)/g, '$1');
  html = html.replace(/(<\/h[1-3]>)\s*<\/p>/g, '$1');
  html = html.replace(/<p>\s*(<pre>)/g, '$1');
  html = html.replace(/(<\/pre>)\s*<\/p>/g, '$1');

  return html;
}
