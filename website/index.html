<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VulAgent — Scan & Filter Viewer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0b0b14;--bg-card:#12121f;--bg-hover:#181830;
  --border:#1e1e38;--text:#c8c8d8;--text-dim:#6a6a80;--text-bright:#f0f0f8;
  --accent:#6366f1;--accent2:#818cf8;
  --green:#34d399;--red:#f87171;--orange:#fb923c;--yellow:#facc15;--cyan:#22d3ee;--pink:#f472b6;
  --radius:10px;--mono:'SF Mono','Cascadia Code','Fira Code',monospace;
}
html{font-size:15px}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}
a{color:var(--accent2);text-decoration:none}
a:hover{text-decoration:underline}
code,pre{font-family:var(--mono);font-size:.85rem}
pre{background:#0a0a12;border:1px solid var(--border);border-radius:var(--radius);padding:1rem;overflow-x:auto;white-space:pre-wrap;word-break:break-word;line-height:1.5;color:#b0b0c8}

/* Layout */
nav{background:rgba(11,11,20,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:.8rem 1.5rem;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:1.2rem}
nav .logo{font-size:1.2rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer}
nav .breadcrumb{color:var(--text-dim);font-size:.85rem;display:flex;align-items:center;gap:.4rem}
nav .breadcrumb span{cursor:pointer;color:var(--text-dim)}
nav .breadcrumb span:hover{color:var(--text)}
nav .breadcrumb .sep{color:#333;cursor:default}

.container{max-width:1200px;margin:0 auto;padding:2rem 1.5rem}

/* Cards */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem;transition:border-color .15s}
.card:hover{border-color:#2a2a4a}
.card h3{font-size:1rem;color:var(--text-bright);margin-bottom:.5rem}

/* Run list */
.run-card{cursor:pointer;display:grid;grid-template-columns:1fr auto;gap:1rem;align-items:center}
.run-card:hover{border-color:var(--accent);background:var(--bg-hover)}
.run-title{font-size:.95rem;font-weight:700;color:var(--text-bright);margin-bottom:.3rem}
.run-file{font-family:var(--mono);font-size:.78rem;color:var(--cyan);margin-bottom:.4rem}
.run-meta{display:flex;flex-wrap:wrap;gap:.4rem}
.run-meta .tag{font-size:.7rem;padding:2px 8px;border-radius:4px;border:1px solid var(--border);color:var(--text-dim);white-space:nowrap}
.run-stats{text-align:right}
.run-stats .big{font-size:1.8rem;font-weight:800;color:var(--green)}
.run-stats .label{font-size:.72rem;color:var(--text-dim)}

/* Badges */
.badge{display:inline-block;font-size:.7rem;padding:2px 8px;border-radius:999px;font-weight:600;letter-spacing:.02em}
.badge-green{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.25)}
.badge-red{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.25)}
.badge-orange{background:rgba(251,146,60,.12);color:var(--orange);border:1px solid rgba(251,146,60,.25)}
.badge-cyan{background:rgba(34,211,238,.12);color:var(--cyan);border:1px solid rgba(34,211,238,.25)}
.badge-purple{background:rgba(99,102,241,.12);color:var(--accent2);border:1px solid rgba(99,102,241,.25)}
.badge-yellow{background:rgba(250,204,21,.12);color:var(--yellow);border:1px solid rgba(250,204,21,.25)}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1.5rem;overflow-x:auto}
.tab{padding:.6rem 1.2rem;font-size:.82rem;color:var(--text-dim);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent)}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* Stat grid */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1rem;margin-bottom:1.5rem}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;text-align:center}
.stat-card .val{font-size:1.5rem;font-weight:800;color:var(--accent2)}
.stat-card .lbl{font-size:.72rem;color:var(--text-dim);margin-top:.2rem}

/* Section */
.section-title{font-size:1.1rem;font-weight:700;color:var(--text-bright);margin:1.5rem 0 1rem;display:flex;align-items:center;gap:.5rem}
.section-title .count{font-size:.75rem;background:var(--accent);color:#fff;padding:1px 8px;border-radius:999px}

/* Hypothesis card */
.hyp-card{border-left:3px solid var(--accent);cursor:pointer}
.hyp-card:hover{border-color:var(--accent);background:var(--bg-hover)}
.hyp-card.valid{border-left-color:var(--green)}
.hyp-card.invalid{border-left-color:var(--red)}
.hyp-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:.5rem}
.hyp-summary{font-size:.9rem;font-weight:600;color:var(--text-bright)}
.hyp-meta{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.5rem}
.confidence-bar{width:80px;height:6px;background:#1a1a30;border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:.4rem}
.confidence-bar .fill{height:100%;border-radius:3px}

/* Hotspot */
.hotspot{background:#0d0d18;border:1px solid var(--border);border-left:3px solid var(--red);border-radius:var(--radius);padding:1rem;margin-bottom:.8rem}
.hotspot .fn{color:var(--pink);font-family:var(--mono);font-size:.82rem}
.hotspot .loc{color:var(--text-dim);font-size:.72rem;margin-top:.2rem}
.hotspot .ctx{color:var(--text);font-size:.82rem;margin-top:.5rem;line-height:1.5}

/* Call chain */
.call-chain{font-family:var(--mono);font-size:.78rem;color:var(--text);padding:.5rem .8rem;background:#0a0a12;border-radius:6px;margin-bottom:.4rem;border:1px solid var(--border)}

/* CWE tag */
.cwe-tag{font-family:var(--mono);font-size:.72rem;padding:2px 6px;border-radius:4px;background:rgba(99,102,241,.1);color:var(--accent2);border:1px solid rgba(99,102,241,.2)}

/* Warning */
.warning-item{font-size:.82rem;color:var(--orange);padding:.3rem 0;padding-left:1rem;position:relative}
.warning-item::before{content:'!';position:absolute;left:0;color:var(--orange);font-weight:700}

/* Trajectory viewer */
.traj-msg{margin-bottom:.8rem;border-radius:var(--radius);padding:1rem;font-size:.82rem;line-height:1.5}
.traj-msg.system{background:#0d0d20;border:1px solid #1a1a3a;color:var(--text-dim)}
.traj-msg.user{background:#0d1420;border:1px solid #1a2a40}
.traj-msg.assistant{background:#0d200d;border:1px solid #1a3a1a}
.traj-msg .role{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4rem}
.traj-msg.system .role{color:var(--text-dim)}
.traj-msg.user .role{color:var(--cyan)}
.traj-msg.assistant .role{color:var(--green)}
.traj-msg .content{white-space:pre-wrap;word-break:break-word;max-height:400px;overflow-y:auto}
.traj-msg .content.collapsed{max-height:150px;overflow:hidden;position:relative}
.traj-msg .content.collapsed::after{content:'';position:absolute;bottom:0;left:0;right:0;height:40px;background:linear-gradient(transparent,var(--bg-card))}
.msg-toggle{font-size:.72rem;color:var(--accent2);cursor:pointer;margin-top:.3rem;display:inline-block}
.msg-toggle:hover{text-decoration:underline}

/* Tool call */
.tool-call{background:#0a0a14;border:1px solid var(--border);border-left:3px solid var(--yellow);border-radius:var(--radius);padding:.8rem;margin:.5rem 0;font-family:var(--mono);font-size:.78rem}
.tool-call .tool-name{color:var(--yellow);font-weight:600}
.tool-call .tool-args{color:var(--text-dim);margin-top:.3rem;white-space:pre-wrap;word-break:break-word;max-height:200px;overflow-y:auto}

/* Removal reason */
.removal-reason{background:#1a0a0a;border:1px solid #3a1a1a;border-radius:var(--radius);padding:1rem;font-size:.82rem;color:var(--red);line-height:1.5;margin-top:.5rem}

/* Summary markdown */
.md-content{font-size:.85rem;line-height:1.7;color:var(--text)}
.md-content h1,.md-content h2,.md-content h3{color:var(--text-bright);margin:1rem 0 .5rem}
.md-content h1{font-size:1.2rem}
.md-content h2{font-size:1.05rem}
.md-content h3{font-size:.95rem}
.md-content ul,.md-content ol{padding-left:1.5rem;margin:.5rem 0}
.md-content li{margin:.2rem 0}
.md-content strong{color:var(--text-bright)}
.md-content code{background:#1a1a2a;padding:1px 4px;border-radius:3px;font-size:.8rem}

/* Back button */
.back-btn{display:inline-flex;align-items:center;gap:.3rem;font-size:.8rem;color:var(--text-dim);cursor:pointer;margin-bottom:1rem;padding:.3rem .6rem;border-radius:4px;transition:all .15s}
.back-btn:hover{color:var(--text);background:var(--bg-hover)}

/* Filter info */
.filter-info{display:flex;gap:1rem;flex-wrap:wrap;align-items:center;margin-top:.5rem}
.filter-info .item{font-size:.75rem;color:var(--text-dim)}
.filter-info .item span{color:var(--text)}

@media(max-width:640px){
  .run-card{grid-template-columns:1fr}
  .run-stats{text-align:left}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  nav{flex-wrap:wrap}
}
</style>
</head>
<body>

<nav>
  <div class="logo" onclick="navigate('list')">VulAgent</div>
  <div class="breadcrumb" id="breadcrumb"></div>
</nav>

<div class="container" id="app"></div>

<script>
const $ = s => document.querySelector(s);
const app = $('#app');

let state = {view:'list', runId:null, hypCategory:null, hypDir:null};

// Simple markdown-to-html (headings, bold, code, lists)
function md(text) {
  if (!text) return '';
  return text
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

function navigate(view, params={}) {
  state = {view, ...params};
  const hash = view === 'list' ? '' :
    view === 'run' ? `run/${params.runId}` :
    view === 'hypothesis' ? `run/${params.runId}/${params.hypCategory}/${params.hypDir}` : '';
  history.pushState(null, '', '#' + hash);
  render();
}

function parseHash() {
  const h = location.hash.slice(1);
  if (!h) return {view:'list'};
  const p = h.split('/');
  if (p[0] === 'run' && p.length === 2) return {view:'run', runId:p[1]};
  if (p[0] === 'run' && p.length >= 4) return {view:'hypothesis', runId:p[1], hypCategory:p[2], hypDir:p.slice(3).join('/')};
  return {view:'list'};
}

async function api(path) {
  const r = await fetch('/api/' + path);
  return r.json();
}

function render() {
  const s = state;
  if (s.view === 'list') renderList();
  else if (s.view === 'run') renderRun(s.runId);
  else if (s.view === 'hypothesis') renderHypothesis(s.runId, s.hypCategory, s.hypDir);
}

// ── Run List ──

async function renderList() {
  setBreadcrumb([{label:'Runs'}]);
  const runs = await api('runs');
  if (!runs.length) {
    app.innerHTML = '<div class="card"><p style="color:var(--text-dim)">No scan_and_filter runs found.</p></div>';
    return;
  }
  app.innerHTML = runs.map(r => `
    <div class="card run-card" onclick="navigate('run',{runId:'${r.id}'})">
      <div>
        <div class="run-title">${esc(r.id)}</div>
        <div class="run-file">${esc(r.file_path)}</div>
        <div class="run-meta">
          <span class="tag">${esc(r.model.split('/').pop())}</span>
          <span class="tag">${r.functions_found} funcs found</span>
          <span class="tag">${r.functions_analyzed} analyzed</span>
          <span class="tag">${Math.round(r.duration_seconds)}s</span>
          <span class="tag">${r.raw_hypotheses} raw</span>
          <span class="tag">${r.deduped_hypotheses} deduped</span>
        </div>
      </div>
      <div class="run-stats">
        <div class="big">${r.final_hypotheses}</div>
        <div class="label">valid</div>
      </div>
    </div>
  `).join('');
}

// ── Run Detail ──

async function renderRun(runId) {
  setBreadcrumb([
    {label:'Runs', action:()=>navigate('list')},
    {label:runId}
  ]);
  app.innerHTML = '<div style="color:var(--text-dim)">Loading...</div>';

  const [summary, valid, invalid] = await Promise.all([
    api(`run/${runId}`),
    api(`run/${runId}/valid`),
    api(`run/${runId}/invalid`)
  ]);

  const info = summary.info || {};

  let html = '';

  // Stats
  html += `<div class="stat-grid">
    <div class="stat-card"><div class="val">${info.functions_found||0}</div><div class="lbl">Functions Found</div></div>
    <div class="stat-card"><div class="val">${info.functions_analyzed||0}</div><div class="lbl">Analyzed</div></div>
    <div class="stat-card"><div class="val">${info.raw_hypothesis_count||0}</div><div class="lbl">Raw Hypotheses</div></div>
    <div class="stat-card"><div class="val">${info.deduped_hypothesis_count||0}</div><div class="lbl">After Dedup</div></div>
    <div class="stat-card"><div class="val" style="color:var(--green)">${info.final_hypothesis_count||0}</div><div class="lbl">Final (Valid)</div></div>
    <div class="stat-card"><div class="val">${Math.round(info.duration_seconds||0)}s</div><div class="lbl">Duration</div></div>
  </div>`;

  // Info card
  html += `<div class="card">
    <h3>Run Info</h3>
    <p style="font-family:var(--mono);font-size:.8rem;color:var(--cyan)">${esc(info.file_path||'')}</p>
    <p style="font-size:.78rem;color:var(--text-dim);margin-top:.3rem">Model: ${esc(info.model||'')} | Started: ${esc(info.started_at_utc||'')}</p>
  </div>`;

  // Tabs: Summary | Valid | Invalid
  html += `<div class="tabs">
    <div class="tab active" data-tab="summary">Summary</div>
    <div class="tab" data-tab="valid">Valid Hypotheses <span class="badge badge-green">${valid.length}</span></div>
    <div class="tab" data-tab="invalid">Invalid / Removed <span class="badge badge-red">${invalid.length}</span></div>
  </div>`;

  // Summary tab
  html += `<div class="tab-panel active" id="tab-summary">
    <div class="card"><h3>Deep Summary</h3><div class="md-content">${md(summary.deep_summary||'')}</div></div>
    <div class="card"><h3>Full Summary</h3><div class="md-content">${md(summary.summary||'')}</div></div>
  </div>`;

  // Valid hypotheses tab
  html += `<div class="tab-panel" id="tab-valid">`;
  if (!valid.length) {
    html += '<div class="card"><p style="color:var(--text-dim)">No valid hypotheses.</p></div>';
  } else {
    valid.forEach(h => {
      const hyp = h.hypothesis || {};
      const cwes = (h._cwe_ids||[]).map(c=>`<span class="cwe-tag">${esc(c)}</span>`).join(' ');
      const conf = h._filter_confidence != null ? h._filter_confidence : null;
      const confBar = conf != null ? `<span style="font-size:.72rem;color:var(--text-dim)">conf: ${(conf*100).toFixed(0)}%</span>${confidenceBar(conf)}` : '';
      html += `<div class="card hyp-card valid" onclick="navigate('hypothesis',{runId:'${runId}',hypCategory:'valid',hypDir:'${esc(h._dir_name)}'})">
        <div class="hyp-header">
          <div>
            <div class="hyp-summary">${esc(hyp.summary||'')}</div>
            <div class="hyp-meta">${cwes} <span class="badge badge-green">VALID</span> ${confBar}</div>
          </div>
        </div>
        <div style="margin-top:.5rem;font-size:.78rem;color:var(--text-dim)">
          Entry: <code>${esc(hyp.harness_entry||'')}</code>
          ${(hyp.hotspots||[]).map(hs=>`| <span style="color:var(--pink)">${esc(hs.file_path)}:${hs.line_start}-${hs.line_end}</span>`).join(' ')}
        </div>
      </div>`;
    });
  }
  html += '</div>';

  // Invalid hypotheses tab
  html += `<div class="tab-panel" id="tab-invalid">`;
  if (!invalid.length) {
    html += '<div class="card"><p style="color:var(--text-dim)">No invalid hypotheses.</p></div>';
  } else {
    invalid.forEach(h => {
      const hyp = h.hypothesis || {};
      const cwes = (h._cwe_ids||[]).map(c=>`<span class="cwe-tag">${esc(c)}</span>`).join(' ');
      const reason = h._removed || '';
      const verdict = h._filter_verdict || '';
      const verdictBadge = verdict === 'INVALID' ? '<span class="badge badge-red">FILTERED</span>' : '<span class="badge badge-orange">REMOVED</span>';
      const conf = h._filter_confidence != null ? `<span style="font-size:.72rem;color:var(--text-dim);margin-left:.5rem">conf: ${(h._filter_confidence*100).toFixed(0)}%</span>` : '';
      html += `<div class="card hyp-card invalid" onclick="navigate('hypothesis',{runId:'${runId}',hypCategory:'invalid',hypDir:'${esc(h._dir_name)}'})">
        <div class="hyp-header">
          <div>
            <div class="hyp-summary">${esc(hyp.summary||'')}</div>
            <div class="hyp-meta">${cwes} ${verdictBadge}${conf}</div>
          </div>
        </div>
        ${reason ? `<div class="removal-reason">${esc(reason)}</div>` : ''}
      </div>`;
    });
  }
  html += '</div>';

  app.innerHTML = html;
  initTabs();
}

// ── Hypothesis Detail ──

async function renderHypothesis(runId, category, dirName) {
  setBreadcrumb([
    {label:'Runs', action:()=>navigate('list')},
    {label:runId, action:()=>navigate('run',{runId})},
    {label:(category==='valid'?'Valid':'Invalid')+': '+dirName}
  ]);
  app.innerHTML = '<div style="color:var(--text-dim)">Loading...</div>';

  const data = await api(`run/${runId}/hypothesis/${category}/${dirName}`);
  const hyp = data.hypothesis || {};
  const hasTraj = data._has_trajectory;

  let html = '';

  // Back
  html += `<div class="back-btn" onclick="navigate('run',{runId:'${runId}'})">&larr; Back to run</div>`;

  // Header
  const verdictClass = data._filter_verdict === 'VALID' ? 'badge-green' : data._filter_verdict === 'INVALID' ? 'badge-red' : 'badge-orange';
  const verdictLabel = data._filter_verdict || (data._removed ? 'REMOVED' : 'UNKNOWN');
  html += `<div class="card">
    <h3>${esc(hyp.summary||'')}</h3>
    <div style="margin-top:.5rem;display:flex;flex-wrap:wrap;gap:.5rem;align-items:center">
      <span class="badge ${verdictClass}">${verdictLabel}</span>
      ${(data._cwe_ids||[]).map(c=>`<span class="cwe-tag">${esc(c)}</span>`).join(' ')}
      ${data._is_asan ? '<span class="badge badge-yellow">ASAN</span>' : ''}
      ${data._is_vulnerability ? '<span class="badge badge-red">Vulnerability</span>' : ''}
    </div>
    ${data._filter_confidence != null ? `
    <div class="filter-info">
      <div class="item">Confidence: <span>${(data._filter_confidence*100).toFixed(0)}%</span> ${confidenceBar(data._filter_confidence)}</div>
      ${data._filter_model_cost ? `<div class="item">Filter cost: <span>$${data._filter_model_cost.toFixed(4)}</span></div>` : ''}
      ${data._filter_model_calls ? `<div class="item">Filter calls: <span>${data._filter_model_calls}</span></div>` : ''}
    </div>` : ''}
    ${data._removed ? `<div class="removal-reason" style="margin-top:1rem">${esc(data._removed)}</div>` : ''}
    ${data._filter_reason ? `<div style="margin-top:.8rem;font-size:.82rem;color:var(--text-dim)">${esc(data._filter_reason)}</div>` : ''}
    ${data._filter_reasoning ? `<div style="margin-top:.5rem;font-size:.82rem;color:var(--text-dim)">${esc(data._filter_reasoning)}</div>` : ''}
  </div>`;

  // Entry & files
  html += `<div class="card">
    <h3>Entry Point</h3>
    <code style="color:var(--cyan);font-size:.9rem">${esc(hyp.harness_entry||'')}</code>
    <div style="margin-top:.5rem;font-size:.78rem;color:var(--text-dim)">Files reviewed: ${(hyp.files_reviewed||[]).map(f=>`<code>${esc(f)}</code>`).join(', ')}</div>
  </div>`;

  // Call chains
  if (hyp.call_chains && hyp.call_chains.length) {
    html += `<div class="section-title">Call Chains <span class="count">${hyp.call_chains.length}</span></div>`;
    hyp.call_chains.forEach(c => {
      html += `<div class="call-chain">${esc(c).replace(/->/g,'<span style="color:var(--accent2)"> -> </span>')}</div>`;
    });
  }

  // Hotspots
  if (hyp.hotspots && hyp.hotspots.length) {
    html += `<div class="section-title">Hotspots <span class="count">${hyp.hotspots.length}</span></div>`;
    hyp.hotspots.forEach(hs => {
      html += `<div class="hotspot">
        <div class="fn">${esc(hs.function||'')}</div>
        <div class="loc">${esc(hs.file_path||'')}:${hs.line_start}-${hs.line_end}</div>
        <div class="ctx">${esc(hs.context||'')}</div>
      </div>`;
    });
  }

  // Warnings
  if (hyp.warnings && hyp.warnings.length) {
    html += `<div class="section-title">Warnings <span class="count">${hyp.warnings.length}</span></div>`;
    html += '<div class="card">';
    hyp.warnings.forEach(w => {
      html += `<div class="warning-item">${esc(w)}</div>`;
    });
    html += '</div>';
  }

  // Filter trajectory
  if (hasTraj) {
    html += `<div class="section-title">Filter Trajectory</div>`;
    html += `<div id="trajectory-container"><div class="back-btn" onclick="loadTrajectory('${runId}','${category}','${esc(dirName)}')">Load trajectory...</div></div>`;
  }

  app.innerHTML = html;
}

async function loadTrajectory(runId, category, dirName) {
  const container = document.getElementById('trajectory-container');
  container.innerHTML = '<div style="color:var(--text-dim)">Loading...</div>';
  const traj = await api(`run/${runId}/trajectory/${category}/${dirName}`);

  let html = '';
  (traj || []).forEach((msg, i) => {
    const role = msg.role || 'unknown';
    const content = typeof msg.content === 'string' ? msg.content : JSON.stringify(msg.content, null, 2);
    const isLong = content.length > 600;
    const id = `traj-${i}`;

    html += `<div class="traj-msg ${role}">
      <div class="role">${role.toUpperCase()}</div>`;

    // Tool calls
    if (msg.tool_calls) {
      msg.tool_calls.forEach(tc => {
        const args = typeof tc.arguments === 'object' ? JSON.stringify(tc.arguments, null, 2) : (tc.arguments || '');
        html += `<div class="tool-call">
          <div class="tool-name">${esc(tc.name||'tool')}</div>
          <div class="tool-args">${esc(args)}</div>
        </div>`;
      });
    }

    html += `<div class="content ${isLong?'collapsed':''}" id="${id}">${esc(content)}</div>`;
    if (isLong) {
      html += `<span class="msg-toggle" onclick="toggleMsg('${id}',this)">Show more</span>`;
    }
    html += '</div>';
  });

  container.innerHTML = html;
}

function toggleMsg(id, el) {
  const c = document.getElementById(id);
  c.classList.toggle('collapsed');
  el.textContent = c.classList.contains('collapsed') ? 'Show more' : 'Show less';
}

// ── Helpers ──

function confidenceBar(val) {
  const pct = Math.round((val||0)*100);
  const color = pct >= 70 ? 'var(--green)' : pct >= 40 ? 'var(--orange)' : 'var(--red)';
  return `<div class="confidence-bar"><div class="fill" style="width:${pct}%;background:${color}"></div></div>`;
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function setBreadcrumb(items) {
  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = items.map((it, i) => {
    const last = i === items.length - 1;
    const sep = i > 0 ? '<span class="sep">/</span>' : '';
    return sep + (it.action && !last
      ? `<span onclick="(${it.action.toString()})()">${esc(it.label)}</span>`
      : `<span style="color:var(--text)">${esc(it.label)}</span>`);
  }).join('');
}

function initTabs() {
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const target = tab.dataset.tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t === tab));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + target));
    });
  });
}

// ── Router ──
window.addEventListener('popstate', () => {
  state = parseHash();
  render();
});

state = parseHash();
render();
</script>
